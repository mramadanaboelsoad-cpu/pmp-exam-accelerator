function drawCharts() {
  var hist = APP.history;
  if (!hist.length) return;
  var isDark = document.documentElement.classList.contains('dark');
  var grid = isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.05)';
  var tick = isDark ? '#94a3b8' : '#64748b';
  function baseOpts() {
    return { responsive:true, plugins:{legend:{display:false}}, scales:{ y:{grid:{color:grid},ticks:{color:tick}}, x:{grid:{display:false},ticks:{color:tick}} } };
  }

  // Score
  if (document.getElementById('ch-score')) {
    try { new Chart(document.getElementById('ch-score'), { type:'line', data:{ labels:hist.map(function(_,i){return '#'+(i+1);}), datasets:[{data:hist.map(function(e){return e.score;}),borderColor:'#0A2342',backgroundColor:'rgba(10,35,66,.1)',tension:.4,fill:true,pointRadius:4}]}, options:baseOpts() }); } catch(e){}
  }

  // Domain
  var dMap = {};
  hist.forEach(function(e) {
    if (!e.domain_scores) return;
    Object.keys(e.domain_scores).forEach(function(d) {
      if (!dMap[d]) dMap[d]={c:0,t:0};
      dMap[d].c += e.domain_scores[d].correct; dMap[d].t += e.domain_scores[d].total;
    });
  });
  var dKeys = Object.keys(dMap);
  if (document.getElementById('ch-domain') && dKeys.length) {
    try { new Chart(document.getElementById('ch-domain'), { type:'bar', data:{ labels:dKeys, datasets:[{data:dKeys.map(function(d){return pct(dMap[d].c,dMap[d].t);}),backgroundColor:['#0A2342','#2E8B57','#F4A261','#D62828','#6b9fdb','#a78bfa'],borderRadius:6}]}, options:baseOpts() }); } catch(e){}
  }

  // Agile vs Predictive
  var ag={c:0,t:0}, pr={c:0,t:0};
  hist.forEach(function(e) {
    if (!e.domain_scores) return;
    Object.keys(e.domain_scores).forEach(function(d) {
      var s = e.domain_scores[d];
      if (/agile|scrum|kanban/i.test(d)) { ag.c+=s.correct; ag.t+=s.total; }
      else { pr.c+=s.correct; pr.t+=s.total; }
    });
  });
  if (document.getElementById('ch-approach')) {
    try { new Chart(document.getElementById('ch-approach'), { type:'doughnut', data:{ labels:['Agile','Predictive'], datasets:[{data:[pct(ag.c,ag.t)||0,pct(pr.c,pr.t)||0],backgroundColor:['#2E8B57','#0A2342'],borderWidth:0}]}, options:{responsive:true,plugins:{legend:{display:true,position:'bottom',labels:{color:tick}}}} }); } catch(e){}
  }

  // Distribution
  var bins=[0,0,0,0,0];
  hist.forEach(function(e){
    if(e.score<50)bins[0]++; else if(e.score<60)bins[1]++; else if(e.score<70)bins[2]++; else if(e.score<80)bins[3]++; else bins[4]++;
  });
  if (document.getElementById('ch-dist')) {
    try { new Chart(document.getElementById('ch-dist'), { type:'bar', data:{ labels:['<50%','50-60%','60-70%','70-80%','80%+'], datasets:[{data:bins,backgroundColor:['#D62828','#F4A261','#F4A261','#2E8B57','#0A2342'],borderRadius:6}]}, options:baseOpts() }); } catch(e){}
  }
}

    // Auto-generate compressed thumbnail for URL sharing (profile photo only)
    if (key === 'photo') {
      compressToThumb(e.target.result, 72, 0.65, function(thumb) {

    saveApp();

    if (prev) prev.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover" />';
    updateSidebar();
  };
  reader.readAsDataURL(file);
}

// Compress image to a square JPEG thumbnail small enough to embed in a URL
function compressToThumb(dataUrl, size, quality, callback) {
  var img = new Image();
  img.onload = function() {
    try {
      var canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      var ctx = canvas.getContext('2d');
      // Cover-fit: scale so the shorter side fills the square
      var scale = Math.max(size / img.width, size / img.height);
      var w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, -(w - size) / 2, -(h - size) / 2, w, h);
      callback(canvas.toDataURL('image/jpeg', quality));
    } catch(e) { callback(''); }
  };
  img.onerror = function() { callback(''); };
  img.src = dataUrl;
}

// Build a short, simple, reliable user link — individual params, no base64
function buildUserLink(userId, userName) {
  var base = 'https://pmp-sf.netlify.app/';
  var t = APP.trainer || {};
  function p(key, val) { return val ? '&' + key + '=' + encodeURIComponent(val) : ''; }
  // Strip UTM params from LinkedIn to keep URL short
  var li = (t.linkedin || '').split('?')[0];
  // Use online photo_url if set; otherwise use compressed thumb (base64, kept small)
  var photo = t.photo_url || t.photo_thumb || '';
  return base + '#user=' + encodeURIComponent(userId) +
    '&name=' + encodeURIComponent(userName || '') +
    p('tn', t.name) +
    p('tc', (t.credentials || '').slice(0, 30)) +
    p('tw', t.whatsapp) +
    p('tp', t.phone) +
    p('te', t.email) +
    p('tl', li) +
    p('tu', photo);
}

      container.innerHTML = '<div style="padding:1rem;color:#D62828;font-size:.8rem">QR library not loaded.<br>Check your internet connection.</div>';

    }
    new QRCode(container, {

    });
    // Store link for copy/download
    container.setAttribute('data-link', link);
  }, 80);

function copyQRLink() {
  var container = document.getElementById('qr-canvas');
  var link = container ? container.getAttribute('data-link') : '';
  if (!link) return;
  var done = function() {
    var el = document.getElementById('qr-copy-confirm');
    if (el) { el.style.display='block'; setTimeout(function(){ el.style.display='none'; }, 2000); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(link).then(done);
  } else {
    var ta = document.createElement('textarea');
    ta.value = link; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); done();
  }
}

function downloadQR(name) {
  var container = document.getElementById('qr-canvas');
  if (!container) return;
  var img = container.querySelector('img') || container.querySelector('canvas');
  if (!img) return;
  var src = img.tagName === 'CANVAS' ? img.toDataURL('image/png') : img.src;
  var a = document.createElement('a');
  a.href = src;
  a.download = 'QR-' + (name||'user').replace(/\s+/g,'-') + '.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function copyUserLink() {
  var el = document.getElementById('user-link-text');
  if (!el) return;
  var text = el.textContent || el.innerText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var c = document.getElementById('copy-confirm');
      if (c) { c.style.display='block'; setTimeout(function(){c.style.display='none';}, 2500); }
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    var c = document.getElementById('copy-confirm');
    if (c) { c.style.display='block'; setTimeout(function(){c.style.display='none';}, 2500); }
  }
}

  APP.users.push(Object.assign({ id: uid(), createdAt: new Date().toISOString(), notes: [] }, data));
  saveApp(); closeModal(); goPage('users');
}

function saveEditUser(userId) {
  var u = (APP.users||[]).find(function(x){return x.id===userId;});
  if (!u) return;
  var data = readContactForm();
  if (!data.name) return;
  Object.assign(u, data);
  saveApp(); closeModal(); goPage('users');
}

function deleteUser(userId) {
  var u = (APP.users||[]).find(function(x){return x.id===userId;});
  if (!u) return;
  if (!confirm('Delete user "' + u.name + '" and all their notes?')) return;
  APP.users = APP.users.filter(function(x){return x.id!==userId;});
  saveApp();
  goPage('users');
}

function addNote(userId) {
  var u = (APP.users||[]).find(function(x){return x.id===userId;});
  var inputEl = document.getElementById('note-input-' + userId);
  if (!u || !inputEl) return;
  var text = inputEl.value.trim();
  if (!text) { inputEl.focus(); return; }
  if (!u.notes) u.notes = [];
  u.notes.unshift({ id: uid(), text: text, date: new Date().toISOString() });
  saveApp();
  // Re-render just this user card for speed
  var card = document.getElementById('user-card-' + userId);
  if (card) {
    card.outerHTML = renderUserCard(u);
  } else {
    goPage('users');
  }
}

function deleteNote(userId, noteId) {
  var u = (APP.users||[]).find(function(x){return x.id===userId;});
  if (!u) return;
  u.notes = (u.notes||[]).filter(function(n){return n.id!==noteId;});
  saveApp();
  var card = document.getElementById('user-card-' + userId);
  if (card) card.outerHTML = renderUserCard(u);
  else goPage('users');
}

function mergedTrainerData() {
  var local = APP.trainer || {};

  // Start with local data
  ['name','credentials','company','bio','phone','whatsapp','email','website','linkedin','photo','photo_url','photo_thumb','copyright'].forEach(function(k) {

  // Override with URL params where non-empty
  ['name','credentials','company','bio','phone','whatsapp','email','website','linkedin','photo_url'].forEach(function(k) {

// ── User Simulator (reuses exam engine but saves to USER_DATA) ──
var _userTimerInterval = null;

function renderUserSimulator() {
  if (USER_DATA.exam) return renderUserExamScreen();

function renderUserExamSetup() {

  return '<div class="max-w-3xl mx-auto space-y-5">' +
    '<div class="text-xl font-bold">Exam Simulator</div>' +

    modeCard('uA','Full PMP Exam', Math.min(qs.length,180)+' questions · 230 min timer',[
      '<span class="badge badge-blue">'+Math.min(qs.length,180)+' Q</span>',
      '<span class="badge badge-orange">Timer</span>'
    ]) +
    modeCard('uB','Custom Exam','Choose count, domain, difficulty',[
      '<span class="badge badge-green">Customizable</span>'
    ],
      '<div style="display:none" id="mode-uB-opts" onclick="event.stopPropagation()">' +

          '<div><label class="lbl">Time (min)</label><input type="number" id="uc-time" class="inp" value="60" min="5" max="300" onclick="event.stopPropagation()" /></div>' +
          '<div><label class="lbl">Domain</label><select id="uc-domain" class="inp" onclick="event.stopPropagation()"><option value="">All Domains</option>'+domains.map(function(d){return '<option>'+esc(d)+'</option>';}).join('')+'</select></div>' +
          '<div><label class="lbl">Difficulty</label><select id="uc-diff" class="inp" onclick="event.stopPropagation()"><option value="">All</option><option>Easy</option><option>Medium</option><option>Hard</option></select></div>' +

      '</div>'

      '<span class="badge badge-orange">No Timer</span>'
    ]) +

  '</div>';
}

var _uMode = 'uC';
function selectMode(m) {  // handles both trainer (A/B/C) and user (uA/uB/uC) modes
  _selectedMode = m;
  _uMode = m;
  ['A','B','C','uA','uB','uC'].forEach(function(x) {
    var card  = document.getElementById('mode-' + x);
    var check = document.getElementById('mode-check-' + x);
    if (card)  card.classList.toggle('active', x === m);
    if (check) check.style.display = x === m ? 'block' : 'none';
  });
  var bOpts = document.getElementById('mode-B-opts');
  if (bOpts) bOpts.style.display = m === 'B' ? 'grid' : 'none';
  var ubOpts = document.getElementById('mode-uB-opts');
  if (ubOpts) ubOpts.style.display = m === 'uB' ? 'block' : 'none';
  // Update trainer hint text
  var hint = document.getElementById('mode-hint');
  if (hint) {
    var labels = { A: 'Full PMP Exam selected', B: 'Custom Exam selected — set options above', C: 'Practice Mode selected',
                   uA: 'Full PMP Exam selected', uB: 'Custom Exam selected', uC: 'Practice Mode selected' };
    hint.textContent = '✓ ' + (labels[m] || m);
  }
}

function startUserExam() {
  var pool = userActiveQuestions();
  if (!pool.length) { alert('No questions available.'); return; }
  var numQ = 30, timeSec = 60*60, mode = 'Practice', isPractice = true;

  if (_uMode === 'uA') {
    numQ = Math.min(180, pool.length); timeSec = 230*60; mode = 'Full PMP'; isPractice = false;
  } else if (_uMode === 'uB') {
    var nEl=document.getElementById('uc-num'), tEl=document.getElementById('uc-time');
    var dEl=document.getElementById('uc-domain'), fEl=document.getElementById('uc-diff');
    numQ = Math.min(parseInt(nEl?nEl.value:30)||30, pool.length);
    timeSec = (parseInt(tEl?tEl.value:60)||60)*60;
    if (dEl&&dEl.value) pool=pool.filter(function(q){return q.domain===dEl.value;});
    if (fEl&&fEl.value) pool=pool.filter(function(q){return q.difficulty===fEl.value;});
    mode = 'Custom'; isPractice = false;
  }

  if (!pool.length) { alert('No questions match those filters.'); return; }
  numQ = Math.min(numQ, pool.length);

  USER_DATA.exam = { id:uid(), mode:mode, isPractice:isPractice, startTime:Date.now(), timeSec:timeSec, questions:shuffle(pool).slice(0,numQ), current:0, answers:{}, flagged:[] };
  USER_DATA.lastResult = null; USER_DATA._showResults = false;
  saveUserData();
  goUserPage('u-simulator');
}

function renderUserExamScreen() {
  var ex = USER_DATA.exam;
  if (!ex) return renderUserExamSetup();
  var q = ex.questions[ex.current], total = ex.questions.length;
  var answered = Object.keys(ex.answers).length, flagged = ex.flagged||[];

  return '<div class="max-w-3xl mx-auto space-y-4">' +
    '<div class="card p-4 flex flex-wrap items-center gap-3">' +
      '<div class="flex-1"><div class="text-xs font-semibold text-gray-400 uppercase">' + esc(ex.mode) + '</div>' +
        '<div class="flex items-center gap-3 mt-1"><span class="font-bold text-sm">Q '+(ex.current+1)+' / '+total+'</span>' +
        '<div class="progress flex-1 max-w-40"><div class="progress-fill" style="width:'+Math.round(ex.current/total*100)+'%;background:#0A2342"></div></div>' +
        '<span class="text-xs text-gray-400">'+answered+' answered</span></div></div>' +
      (!ex.isPractice ? '<div id="u-timer" class="font-bold text-lg text-navy dark:text-blue-400">⏱ --:--</div>' :
        '<button id="reveal-toggle" onclick="toggleAutoReveal()" style="display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .85rem;border-radius:8px;border:1.5px solid;font-size:.8rem;font-weight:700;cursor:pointer;background:'+(_autoReveal?'#dcfce7':'#fee2e2')+';color:'+(_autoReveal?'#15803d':'#b91c1c')+';border-color:'+(_autoReveal?'#86efac':'#fca5a5')+'">'+(_autoReveal?'👁 Auto Answer: ON':'👁 Auto Answer: OFF')+'</button>') +
      '<button class="btn btn-danger text-xs py-1.5 px-3" onclick="confirmUserFinish()">Finish</button>' +
    '</div>' +

    '<div class="card p-6">' +
      '<div class="flex items-center justify-between mb-4 flex-wrap gap-2">' +
        '<div class="flex gap-2">'+(q.domain?'<span class="badge badge-blue">'+esc(q.domain)+'</span>':'')+(q.difficulty?'<span class="badge '+(q.difficulty==='Hard'?'badge-red':q.difficulty==='Easy'?'badge-green':'badge-orange')+'">'+esc(q.difficulty)+'</span>':'')+'</div>' +
        '<button onclick="toggleUserFlag('+ex.current+')" class="btn btn-ghost text-xs py-1 px-2" id="uflag-'+ex.current+'">'+(flagged.indexOf(ex.current)!==-1?'🚩 Flagged':'⚑ Flag')+'</button>' +
      '</div>' +
      '<div class="text-base font-medium leading-relaxed mb-5">'+esc(q.question)+'</div>' +
      '<div class="space-y-3" id="u-opts">'+renderUserOptions(q,ex)+'</div>' +
    '</div>' +
    '<div id="u-ans-panel"></div>' +

    '<div class="flex items-center justify-between flex-wrap gap-3">' +
      '<button class="btn btn-ghost" onclick="navUserQ(-1)" '+(ex.current===0?'disabled':'')+'>← Prev</button>' +
      '<div class="flex gap-1 flex-wrap justify-center">' +
        ex.questions.map(function(_,idx){
          var isAns=ex.answers[idx]!==undefined, isCurr=idx===ex.current, isFlag=flagged.indexOf(idx)!==-1;
          var style=isCurr?'background:#0A2342;color:#fff':isAns?'background:#dcfce7;color:#15803d;border:1px solid #86efac':isFlag?'background:#ffedd5;color:#c2410c;border:1px solid #fdba74':'background:#F7F9FC;color:#64748b;border:1px solid #E5EAF0';
          return '<button onclick="jumpUserQ('+idx+')" style="width:28px;height:28px;border-radius:6px;font-size:.75rem;font-weight:700;border:none;cursor:pointer;'+style+'">'+(idx+1)+'</button>';
        }).join('') +
      '</div>' +
      (ex.current<total-1?'<button class="btn btn-primary" onclick="navUserQ(1)">Next →</button>':'<button class="btn btn-success" onclick="confirmUserFinish()">Finish ✓</button>') +
    '</div>' +
  '</div>';
}

function renderUserOptions(q, ex) {
  var sel=ex.answers[ex.current], showRes=ex.isPractice&&sel!==undefined&&_autoReveal;
  return ['A','B','C','D'].map(function(l){
    var t=q['option'+l]; if(!t) return '';
    var cls=showRes?(l===q.correct?'ok':l===sel?'bad':''):(l===sel?'sel':'');
    var dis=(showRes||(!ex.isPractice&&sel!==undefined))?'disabled':'';
    return '<button class="opt '+cls+'" onclick="pickUserAnswer(\''+l+'\')" '+dis+'><span class="opt-key">'+l+'</span><span>'+esc(t)+'</span></button>';
  }).join('');
}

function pickUserAnswer(letter) {
  var ex=USER_DATA.exam; if(!ex||ex.answers[ex.current]!==undefined) return;
  ex.answers[ex.current]=letter; saveUserData();
  var optsEl=document.getElementById('u-opts'); if(optsEl) optsEl.innerHTML=renderUserOptions(ex.questions[ex.current],ex);
  if (ex.isPractice) {
    var panel=document.getElementById('u-ans-panel');
    if (_autoReveal) {
      if (panel) {
        // Temporarily swap ID so showAnswerPanel writes to the right element
        panel.id='ans-panel';
        showAnswerPanel(ex.questions[ex.current],letter);
        var written=document.getElementById('ans-panel');
        if(written) written.id='u-ans-panel';
      }
    } else if(panel) {
      panel.innerHTML='<button class="btn btn-primary w-full" onclick="revealUserAnswer()" style="justify-content:center;padding:.75rem">Show Correct Answer &amp; Explanation</button>';
    }
  }
}

function revealUserAnswer() {
  var ex=USER_DATA.exam; if(!ex) return;
  var sel=ex.answers[ex.current];
  if(sel===undefined) return;
  var panel=document.getElementById('u-ans-panel');
  if(panel){ panel.id='ans-panel'; showAnswerPanel(ex.questions[ex.current],sel); var w=document.getElementById('ans-panel'); if(w) w.id='u-ans-panel'; }
}

function navUserQ(dir) { var ex=USER_DATA.exam; if(!ex) return; var n=ex.current+dir; if(n<0||n>=ex.questions.length) return; ex.current=n; saveUserData(); goUserPage('u-simulator'); }
function jumpUserQ(idx) { var ex=USER_DATA.exam; if(!ex) return; ex.current=idx; saveUserData(); goUserPage('u-simulator'); }
function toggleUserFlag(idx) {
  var ex=USER_DATA.exam; if(!ex) return;
  var arr=ex.flagged||[], pos=arr.indexOf(idx);
  if(pos===-1) arr.push(idx); else arr.splice(pos,1);
  ex.flagged=arr; saveUserData();
  goUserPage('u-simulator');
}

function startUserTimer() {
  if (_userTimerInterval) clearInterval(_userTimerInterval);
  var ex=USER_DATA.exam; if(!ex||ex.isPractice||!ex.timeSec) return;
  function tick() {
    var el=document.getElementById('u-timer'); if(!el){clearInterval(_userTimerInterval);return;}
    var rem=ex.timeSec-Math.floor((Date.now()-ex.startTime)/1000);
    if(rem<=0){clearInterval(_userTimerInterval);finishUserExam();return;}
    el.textContent='⏱ '+fmtTimer(rem);
    el.className='font-bold text-lg '+(rem<600?'timer-warn':'text-navy dark:text-blue-400');
  }
  tick(); _userTimerInterval=setInterval(tick,1000);
}

function confirmUserFinish() {
  var ex=USER_DATA.exam; if(!ex) return;
  var u=ex.questions.length-Object.keys(ex.answers).length;
  if(u>0&&!confirm(u+' question(s) unanswered. Finish anyway?')) return;
  finishUserExam();
}

function finishUserExam() {
  clearInterval(_userTimerInterval);
  var ex=USER_DATA.exam; if(!ex) return;
  var elapsed=Math.floor((Date.now()-ex.startTime)/1000), correct=0, domain_scores={};
  ex.questions.forEach(function(q,i){
    var right=ex.answers[i]===q.correct; if(right) correct++;
    var d=q.domain||'General'; if(!domain_scores[d]) domain_scores[d]={correct:0,total:0};
    domain_scores[d].total++; if(right) domain_scores[d].correct++;
  });
  var score=pct(correct,ex.questions.length);
  var result={id:ex.id,date:new Date().toISOString(),mode:ex.mode,score:score,correct:correct,total:ex.questions.length,duration:elapsed,domain_scores:domain_scores,questions:ex.questions,answers:ex.answers};
  if(!USER_DATA.history) USER_DATA.history=[];
  USER_DATA.history.push({id:result.id,date:result.date,mode:result.mode,score:result.score,correct:result.correct,total:result.total,duration:result.duration,domain_scores:result.domain_scores});
  USER_DATA.lastResult=result; USER_DATA._showResults=true; USER_DATA.exam=null;
  saveUserData();
  goUserPage('u-simulator');
}

function renderUserResults() {
  var r=USER_DATA.lastResult; if(!r) return renderUserExamSetup();
  var passed=r.score>=70;
  var doms=Object.keys(r.domain_scores||{}).map(function(d){return{name:d,p:pct(r.domain_scores[d].correct,r.domain_scores[d].total),c:r.domain_scores[d].correct,t:r.domain_scores[d].total};});

  return '<div class="max-w-3xl mx-auto space-y-5">' +
    '<div class="card p-8 text-center text-white '+(passed?'grad-green':'grad-red')+'">' +
      '<div style="font-size:3rem;margin-bottom:.5rem">'+(passed?'🎉':'💪')+'</div>' +
      '<div style="font-size:2.5rem;font-weight:900">'+r.score.toFixed(1)+'%</div>' +
      '<div style="opacity:.8;font-size:1.1rem;margin-top:.25rem">'+(passed?'PASSED':'KEEP PRACTICING')+'</div>' +
      '<div style="display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem;flex-wrap:wrap">' +
        '<div><div style="font-size:1.75rem;font-weight:900">'+r.correct+'</div><div style="font-size:.75rem;opacity:.6;text-transform:uppercase">Correct</div></div>' +
        '<div><div style="font-size:1.75rem;font-weight:900">'+(r.total-r.correct)+'</div><div style="font-size:.75rem;opacity:.6;text-transform:uppercase">Wrong</div></div>' +
        '<div><div style="font-size:1.75rem;font-weight:900">'+r.total+'</div><div style="font-size:.75rem;opacity:.6;text-transform:uppercase">Total</div></div>' +
      '</div>' +
    '</div>' +
    (doms.length?'<div class="card p-5"><div class="font-semibold mb-4">Domain Performance</div>'+doms.map(function(d){return '<div class="mb-3"><div class="flex justify-between text-sm mb-1.5"><span class="font-medium">'+esc(d.name)+'</span><span class="font-bold '+(d.p>=70?'text-green-600':'text-red-500')+'">'+d.p+'% ('+d.c+'/'+d.t+')</span></div><div class="progress"><div class="progress-fill '+(d.p>=70?'bg-green-500':'bg-red-500')+'" style="width:'+d.p+'%"></div></div></div>';}).join('')+'</div>':'') +
    '<div class="flex gap-3 justify-end">' +
      '<button class="btn btn-ghost" onclick="goUserPage(\'u-analytics\')">Analytics</button>' +
      '<button class="btn btn-primary" onclick="USER_DATA._showResults=false;USER_DATA.lastResult=null;saveUserData();goUserPage(\'u-simulator\')">▶ New Exam</button>' +
    '</div>' +
  '</div>';
}

    ) +

function filterUserQB() {
  var q = (document.getElementById('uqb-search')||{value:''}).value.toLowerCase();
  var dom = (document.getElementById('uqb-domain')||{value:''}).value;
  var all = userActiveQuestions().filter(function(x) {
    if (q && !(x.question||'').toLowerCase().includes(q)) return false;
    if (dom && x.domain !== dom) return false;
    return true;
  });
  var list = document.getElementById('uqb-list');
  var cnt  = document.getElementById('uqb-count');
  if (!list) return;
  list.innerHTML = all.slice(0,30).map(function(x,i) {
    return '<div class="border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm">' +
      '<div class="flex items-center gap-2 mb-1 text-xs text-gray-400">' +
        '<span>#'+(i+1)+'</span>' +
        (x.domain?'<span class="badge badge-blue">'+esc(x.domain)+'</span>':'') +
        (x.difficulty?'<span class="badge '+(x.difficulty==='Hard'?'badge-red':x.difficulty==='Easy'?'badge-green':'badge-orange')+'">'+esc(x.difficulty)+'</span>':'') +
      '</div>' +
      '<div class="font-medium mb-2">'+esc(x.question)+'</div>' +
      '<div class="grid sm:grid-cols-2 gap-1">' +
        ['A','B','C','D'].map(function(l){var t=x['option'+l];return t?'<div class="text-xs py-1 px-2 rounded '+(x.correct===l?'bg-green-50 dark:bg-green-900/20 text-green-700 font-semibold':'')+'">' +l+'. '+esc(t)+'</div>':''}).join('') +
      '</div>' +
    '</div>';
  }).join('');
  if (cnt) cnt.textContent = 'Showing '+Math.min(30,all.length)+' of '+all.length+' questions';
}

function toggleUserBank(id) {
  var b = (USER_DATA.banks||[]).find(function(x){return x.id===id;});
  if (b) { b.active=!b.active; saveUserData(); goUserPage('u-questionbank'); }
}
function deleteUserBank(id) {
  if (!confirm('Delete this bank?')) return;
  USER_DATA.banks = (USER_DATA.banks||[]).filter(function(x){return x.id!==id;});
  saveUserData(); goUserPage('u-questionbank');
}

              '<div class="text-xs text-gray-400 mt-1">Excel · CSV · JSON · Word</div>' +

            '<input type="file" id="uup-file" accept=".xlsx,.csv,.json,.docx,.doc" class="hidden" onchange="handleUserUploadFile(this)" />' +
          '</div>' +
          '<div id="uup-preview" style="display:none"><div class="text-xs font-semibold text-gray-500 mb-1 uppercase">Preview</div><div id="uup-preview-content" class="text-xs bg-gray-50 dark:bg-gray-800 p-3 rounded-lg max-h-28 overflow-y-auto"></div></div>' +
          '<div class="flex justify-end gap-3 pt-1">' +
            '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
            '<button class="btn btn-primary" onclick="doUserImport()">⊕ Import Bank</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  document.getElementById('uup-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});
}

function handleUserUploadFile(input) {
  var file=input.files[0]; if(!file) return;
  document.getElementById('uup-label').textContent=file.name;
  var ext=file.name.split('.').pop().toLowerCase();
  if (ext==='docx'||ext==='doc') {
    var reader=new FileReader();
    reader.onload=function(e){
      if(!window.mammoth){alert('mammoth.js not loaded yet.');return;}
      mammoth.extractRawText({arrayBuffer:e.target.result}).then(function(res){
        _userUploadData=parseDocxText(res.value);
        showUserPreview(_userUploadData);
      }).catch(function(err){alert('Error: '+err.message);});
    };
    reader.readAsArrayBuffer(file); return;
  }
  var uupLabel = document.getElementById('uup-label');
  if (uupLabel) uupLabel.textContent = '⏳ Reading ' + file.name + '…';
  _userUploadData = null;
  function uProcessText(text) {
    try {
      text = text.replace(/^﻿/, '');
      var rows;
      if (ext === 'json') {
        var parsed = JSON.parse(text);
        if (Array.isArray(parsed)) rows = parsed;
        else if (typeof parsed === 'object' && parsed !== null) {
          var keys = Object.keys(parsed);
          for (var ki = 0; ki < keys.length; ki++) { if (Array.isArray(parsed[keys[ki]])) { rows = parsed[keys[ki]]; break; } }
          if (!rows) rows = [parsed];
        }
      } else { rows = Papa.parse(text, { header: true, skipEmptyLines: true }).data; }
      if (!rows || !rows.length) { alert('File appears empty.'); return; }
      _userUploadData = rows.map(normalizeRow);
      if (uupLabel) uupLabel.textContent = '✅ ' + file.name + ' — ' + _userUploadData.length + ' rows';
      showUserPreview(_userUploadData);
    } catch(err) { if(uupLabel) uupLabel.textContent = file.name; alert('Could not parse: ' + err.message); }
  }
  if (ext === 'xlsx' || ext === 'xls') {
    var r2 = new FileReader();
    r2.onerror = function() { if(uupLabel) uupLabel.textContent = file.name; alert('Cannot read file. On iPhone: download it first (no ☁ icon in Files app).'); };
    r2.onload = function(e) { try { var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'}); var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); _userUploadData=rows.map(normalizeRow); if(uupLabel) uupLabel.textContent='✅ '+file.name; showUserPreview(_userUploadData); } catch(err) { alert('Excel error: '+err.message); } };
    r2.readAsArrayBuffer(file);
  } else {
    var r2 = new FileReader();
    r2.onerror = function() { if(uupLabel) uupLabel.textContent = file.name; alert('Cannot read file. On iPhone: download it first (no ☁ icon in Files app).'); };
    r2.onload = function(e) { uProcessText(e.target.result); };
    r2.readAsText(file, 'UTF-8');
  }
}

function showUserPreview(data) {
  var prev=document.getElementById('uup-preview'), cont=document.getElementById('uup-preview-content');
  if(!prev||!cont) return;
  prev.style.display='block';
  cont.innerHTML='<div style="color:#2E8B57;font-weight:600;margin-bottom:4px">✓ Found '+data.length+' questions</div>'+
    data.slice(0,3).map(function(q){return '<div style="border-bottom:1px solid #e5e7eb;padding:4px 0">'+esc((q.question||'').slice(0,100))+'</div>';}).join('');
}

function doUserImport() {
  var name=(document.getElementById('uup-name')||{value:''}).value.trim()||'My Bank';
  if(!_userUploadData||!_userUploadData.length){alert('Select a valid file first.');return;}
  var valid=_userUploadData.filter(function(q){return q.question&&q.optionA&&q.correct;});
  if(!valid.length){alert('No valid questions found. Check column names.');return;}
  if(!USER_DATA.banks) USER_DATA.banks=[];
  USER_DATA.banks.push({id:uid(),name:name,active:true,questions:valid,date:new Date().toISOString()});
  _userUploadData=null;
  saveUserData();
  closeModal();
  goUserPage('u-questionbank');
}

// ── User Analytics ──
function renderUserAnalytics() {
  var hist=USER_DATA.history||[];
  if(!hist.length) return '<div class="max-w-xl mx-auto card p-10 text-center"><div style="font-size:3rem;margin-bottom:1rem;opacity:.3">📊</div><div class="font-semibold">No exam history yet</div><div class="text-sm text-gray-400 mt-1 mb-4">Complete your first exam to see analytics</div><button class="btn btn-primary" onclick="goUserPage(\'u-simulator\')">▶ Start Exam</button></div>';
  var scores=hist.map(function(e){return e.score;}), avg=scores.reduce(function(a,b){return a+b;})/scores.length;
  return '<div class="space-y-5">' +
    '<div class="text-xl font-bold">My Analytics</div>' +
    '<div class="grid grid-cols-2 lg:grid-cols-3 gap-4">' +
      statCard('Exams',hist.length,'📝','grad-navy') +
      statCard('Average',avg.toFixed(1)+'%','📊','grad-green') +
      statCard('Pass Rate',pct(hist.filter(function(e){return e.score>=70;}).length,hist.length)+'%','🎯','grad-orange') +
    '</div>' +
    '<div class="card p-5"><div class="font-semibold mb-3">Score Trend</div><canvas id="u-ch-score" height="180"></canvas></div>' +
    '<div class="card overflow-hidden"><div class="p-4 border-b border-gray-100 dark:border-gray-700 font-semibold">All Exams</div><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>#</th><th>Date</th><th>Mode</th><th>Score</th><th>Result</th></tr></thead><tbody>'+
      hist.slice().reverse().map(function(e,i){return '<tr><td>'+(hist.length-i)+'</td><td>'+new Date(e.date).toLocaleDateString()+'</td><td><span class="badge badge-blue">'+esc(e.mode)+'</span></td><td class="font-bold '+(e.score>=70?'text-green-600':'text-red-500')+'">'+e.score.toFixed(1)+'%</td><td><span class="badge '+(e.score>=70?'badge-green':'badge-red')+'">'+(e.score>=70?'Pass':'Fail')+'</span></td></tr>';}).join('') +
    '</tbody></table></div></div>' +
  '</div>';
}

function drawUserCharts() {
  var hist=USER_DATA.history||[]; if(!hist.length) return;
  var isDark=document.documentElement.classList.contains('dark');
  var grid=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)', tick=isDark?'#94a3b8':'#64748b';
  var el=document.getElementById('u-ch-score');
  if(el) try{new Chart(el,{type:'line',data:{labels:hist.map(function(_,i){return '#'+(i+1);}),datasets:[{data:hist.map(function(e){return e.score;}),borderColor:'#0A2342',backgroundColor:'rgba(10,35,66,.1)',tension:.4,fill:true,pointRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:grid},ticks:{color:tick}},x:{grid:{display:false},ticks:{color:tick}}}}});}catch(e){}
}

// ── User Notes ──
function renderUserNotes() {
  var notes = USER_DATA.notes || [];
  return '<div class="max-w-2xl mx-auto space-y-5">' +
    '<div class="text-xl font-bold">My Notes</div>' +
    '<div class="card p-5">' +
      '<div class="lbl mb-2">Add New Note</div>' +
      '<div style="display:flex;gap:.5rem;align-items:flex-end">' +
        '<textarea id="user-note-input" class="inp" placeholder="Write a note, study tip, or reminder…" style="height:80px;resize:none;flex:1"></textarea>' +
        '<button onclick="addUserNote()" class="btn btn-primary" style="align-self:flex-end;padding:.55rem 1.2rem">Add</button>' +
      '</div>' +
    '</div>' +
    (notes.length
      ? '<div class="space-y-3">' + notes.map(function(n){
          return '<div class="card p-4 flex gap-3 items-start">' +
            '<div class="flex-1">' +
              '<div class="text-sm leading-relaxed">' + esc(n.text) + '</div>' +
              '<div class="text-xs text-gray-400 mt-1.5">' + new Date(n.date).toLocaleString() + '</div>' +
            '</div>' +
            '<button onclick="deleteUserNote(\'' + n.id + '\')" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:1rem;flex-shrink:0">✕</button>' +
          '</div>';
        }).join('') + '</div>'
      : '<div class="card p-8 text-center text-gray-400"><div style="font-size:2.5rem;margin-bottom:.75rem;opacity:.3">📝</div><div class="font-medium">No notes yet</div><div class="text-sm mt-1">Add your first study note above</div></div>'
    ) +
  '</div>';
}

function addUserNote() {
  var input=document.getElementById('user-note-input'); if(!input) return;
  var text=input.value.trim(); if(!text){input.focus();return;}
  if(!USER_DATA.notes) USER_DATA.notes=[];
  USER_DATA.notes.unshift({id:uid(),text:text,date:new Date().toISOString()});
  saveUserData();
  input.value='';
  goUserPage('u-notes');
}

function deleteUserNote(noteId) {
  USER_DATA.notes=(USER_DATA.notes||[]).filter(function(n){return n.id!==noteId;});
  saveUserData();
  goUserPage('u-notes');
}

//  RESET MODAL
// ─────────────────────────────────────────────

  var hasExam    = !!APP.exam;
  var hasHistory = APP.history.length > 0;
  var hasBanks   = APP.banks.length > 0;

  document.getElementById('modal').innerHTML =
    '<div class="modal-bg" id="reset-modal-bg">' +
      '<div class="modal-box" style="max-width:420px">' +

        '<div class="flex items-center justify-between mb-5">' +
          '<div>' +
            '<div class="font-bold text-lg">Reset Options</div>' +
            '<div class="text-sm text-gray-400 mt-0.5">Choose what to clear</div>' +
          '</div>' +
          '<button onclick="closeModal()" style="font-size:1.4rem;background:none;border:none;cursor:pointer;color:#94a3b8;line-height:1">×</button>' +
        '</div>' +

        '<div class="space-y-3">' +

          // Option 1: Clear stuck exam
          '<div class="border border-gray-200 dark:border-gray-700 rounded-xl p-4">' +
            '<div class="flex items-start gap-3">' +
              '<div style="font-size:1.5rem;line-height:1">🔄</div>' +
              '<div class="flex-1">' +
                '<div class="font-semibold text-sm">Clear Active Exam</div>' +
                '<div class="text-xs text-gray-400 mt-0.5 mb-2">' + (hasExam ? '⚠️ You have an exam in progress — this will abandon it.' : 'No active exam right now.') + '</div>' +
                '<button onclick="resetExamOnly()" class="btn btn-ghost text-xs py-1.5 px-3" ' + (!hasExam ? 'disabled' : '') + '>Clear Exam</button>' +
              '</div>' +
            '</div>' +
          '</div>' +

          // Option 2: Clear history
          '<div class="border border-gray-200 dark:border-gray-700 rounded-xl p-4">' +
            '<div class="flex items-start gap-3">' +
              '<div style="font-size:1.5rem;line-height:1">📊</div>' +
              '<div class="flex-1">' +
                '<div class="font-semibold text-sm">Clear Exam History</div>' +
                '<div class="text-xs text-gray-400 mt-0.5 mb-2">' + (hasHistory ? APP.history.length + ' exam record(s) will be deleted.' : 'No history to clear.') + '</div>' +
                '<button onclick="resetHistory()" class="btn btn-ghost text-xs py-1.5 px-3" ' + (!hasHistory ? 'disabled' : '') + '>Clear History</button>' +
              '</div>' +
            '</div>' +
          '</div>' +

          // Option 3: Clear question banks
          '<div class="border border-gray-200 dark:border-gray-700 rounded-xl p-4">' +
            '<div class="flex items-start gap-3">' +
              '<div style="font-size:1.5rem;line-height:1">📚</div>' +
              '<div class="flex-1">' +
                '<div class="font-semibold text-sm">Clear Question Banks</div>' +
                '<div class="text-xs text-gray-400 mt-0.5 mb-2">' + (hasBanks ? APP.banks.length + ' bank(s) (' + APP.banks.reduce(function(a,b){return a+b.questions.length;},0) + ' questions) will be removed.' : 'No banks loaded.') + '</div>' +
                '<button onclick="resetBanks()" class="btn btn-ghost text-xs py-1.5 px-3" ' + (!hasBanks ? 'disabled' : '') + '>Clear Banks</button>' +
              '</div>' +
            '</div>' +
          '</div>' +

          // Option 4: Full reset
          '<div class="border border-red-200 dark:border-red-900 rounded-xl p-4" style="background:#fff5f5">' +
            '<div class="flex items-start gap-3">' +
              '<div style="font-size:1.5rem;line-height:1">⚠️</div>' +
              '<div class="flex-1">' +
                '<div class="font-semibold text-sm text-red-600">Full Factory Reset</div>' +
                '<div class="text-xs text-gray-500 mt-0.5 mb-2">Clears everything — exam, history, banks, and trainer profile. Cannot be undone.</div>' +
                '<button onclick="resetFull()" class="btn btn-danger text-xs py-1.5 px-3">Full Reset</button>' +
              '</div>' +
            '</div>' +

  document.getElementById('reset-modal-bg').addEventListener('click', function(e) {

  });

function resetExamOnly() {
  clearInterval(_timerInterval);
  APP.exam = null;
  APP.lastResult = null;
  APP._showResults = false;
  saveApp();
  closeModal();
  goPage('simulator');
}

function resetHistory() {
  if (!confirm('Delete all ' + APP.history.length + ' exam record(s)?')) return;
  APP.history = [];
  saveApp();
  closeModal();
  goPage('dashboard');
}

function resetBanks() {
  if (!confirm('Remove all question banks? This cannot be undone.')) return;
  clearInterval(_timerInterval);
  APP.banks = [];
  APP.exam = null;
  APP.lastResult = null;
  APP._showResults = false;
  saveApp();
  closeModal();
  goPage('questionbank');
}

function resetFull() {
  if (!confirm('Full reset — delete everything including trainer profile? Cannot be undone.')) return;
  clearInterval(_timerInterval);
  localStorage.removeItem(STORE_KEY);
  location.reload();
}

// ─────────────────────────────────────────────
//  START — all vars/functions declared above, safe to init now
// ─────────────────────────────────────────────
loadApp();   // always load trainer data (for question banks + theme)

if (_activeUserId) {
  // ── USER MODE ── (student link)
  // Do NOT modify or save trainer's APP data in user mode
  loadUserData();
  initUserMode();
} else {
  // ── TRAINER MODE ──
  // Auto-load built-in banks on first launch (trainer only)
  (function() {
    if (!APP.banks) APP.banks = [];
    var ids = APP.banks.map(function(b){ return b.id; });
    var added = false;
    if (typeof BUILTIN_BANK !== 'undefined' && BUILTIN_BANK.questions && BUILTIN_BANK.questions.length && ids.indexOf(BUILTIN_BANK.id) === -1) {
      APP.banks.push(Object.assign({}, BUILTIN_BANK));
      added = true;
    }
    if (typeof BUILTIN_BANK_2 !== 'undefined' && BUILTIN_BANK_2.questions && BUILTIN_BANK_2.questions.length && ids.indexOf(BUILTIN_BANK_2.id) === -1) {
      APP.banks.push(Object.assign({}, BUILTIN_BANK_2));
      added = true;
    }
    if (added) saveApp();
  })();
  applyTheme();
  updateSidebar();
  goPage(APP.page || 'dashboard');
}
