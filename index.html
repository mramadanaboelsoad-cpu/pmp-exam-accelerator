var BUILTIN_BANK_2 = {"id": "builtin-ethics-advanced-002", "name": "PMI Ethics & Mindset — 58Q (Advanced)", "active": true, "date": "2026-06-08T00:00:00.000Z", "questions": [{"id": "a0", "question": "A vendor bidding on a large contract invites the PM and their spouse to an all-expenses-paid trip with no business agenda. What should the PM do?", "optionA": "Accept since it is a social event unrelated to bidding.", "optionB": "Accept only if the value is below the gift policy threshold.", "optionC": "Decline the trip and disclose the offer per conflict of interest policy.", "optionD": "Accept but recuse from vendor selection.", "correct": "C", "explanation": "PMI Fairness: gifts from active bidders must be declined AND disclosed regardless of occasion or value. Conditional acceptance does not remove the ethical violation.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a1", "question": "After contract award, a vendor sends the PM a $45 gift basket as a thank-you. Company policy allows gifts under $50. What should the PM do?", "optionA": "Accept since it is within company policy.", "optionB": "Accept but document it.", "optionC": "Return the gift — accepting from vendors creates perception of impropriety.", "optionD": "Donate it to the team to avoid personal benefit.", "correct": "C", "explanation": "Company policy sets a minimum standard, not a ceiling. PMI expects higher professional conduct. Post-award gifts can influence future decisions and must be returned.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a2", "question": "A vendor's representative offers concert tickets to the PM during an active bid evaluation. The PM enjoys this artist. What is the BEST response?", "optionA": "Accept since it is just a friendly gesture.", "optionB": "Decline the tickets and continue evaluating objectively.", "optionC": "Accept but ensure no preferential treatment.", "optionD": "Accept and report it after the evaluation closes.", "correct": "B", "explanation": "Any gift during active vendor evaluation compromises fairness regardless of value. Delayed reporting is insufficient. The PM must decline immediately.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a3", "question": "A government official says project permits will be approved faster if a 'processing fee' is paid directly to him. This practice is common locally. What should the PM do?", "optionA": "Pay since it is a local custom.", "optionB": "Refuse and immediately report to management and legal counsel.", "optionC": "Pay and record as a project expense.", "optionD": "Have a local team member handle the payment.", "correct": "B", "explanation": "Bribery violates PMI ethics and anti-corruption laws regardless of local norms. The PM must refuse and escalate. Indirect bribery (D) is equally illegal.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a4", "question": "A team member reveals they received a cash gift from a subcontractor and claims it was personal. What should the PM do FIRST?", "optionA": "Ignore it since the PM was not involved.", "optionB": "Remind the team member of gift policy and document.", "optionC": "Report immediately to HR and the appropriate manager.", "optionD": "Ask the team member to return the gift and close the matter.", "correct": "C", "explanation": "Cash gifts from subcontractors are a serious integrity concern requiring immediate escalation. Informal handling makes the PM complicit in a potential violation.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a5", "question": "A client executive insists on paying for the team's kick-off dinner. Refusing could cause cultural offense. What should the PM do?", "optionA": "Accept gracefully to preserve the relationship.", "optionB": "Accept and report per gift policy.", "optionC": "Politely explain the company policy and offer to split or have the company cover it.", "optionD": "Accept if below the gift policy limit.", "correct": "C", "explanation": "Ethics do not require rudeness. Explaining policy while offering an alternative respects both the relationship and professional standards. Accepting without disclosure bypasses required reporting.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a6", "question": "A PM discovers a respected colleague accepted expensive sports tickets from a vendor and did not report them. What should the PM do?", "optionA": "Say nothing since it is not their business.", "optionB": "Advise the colleague privately to return them.", "optionC": "Report the violation per the organisation's ethics policy.", "optionD": "Wait to see if the colleague self-reports.", "correct": "C", "explanation": "PMI requires reporting ethics violations even involving respected colleagues. Loyalty to an individual cannot override professional obligation to the organisation and standards.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a7", "question": "A software vendor under evaluation offers the PM $2,000 of free training unrelated to the product. What should the PM do?", "optionA": "Accept since it benefits professional development.", "optionB": "Accept after the evaluation is complete.", "optionC": "Decline and disclose the offer to management.", "optionD": "Accept and disclose it in the evaluation notes.", "correct": "C", "explanation": "Training worth $2,000 from an active vendor is a gift creating perceived bias. It must be declined and disclosed regardless of the PM's intent or the training's relevance.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a8", "question": "A project is 3 weeks behind schedule. The sponsor asks the PM to report it as 'on track' before the board meeting. What should the PM do?", "optionA": "Report as on track since the sponsor has authority.", "optionB": "Report accurately and include a recovery plan.", "optionC": "Delay the report until after the board meeting.", "optionD": "Report as 'at risk' without specifying the extent of delay.", "correct": "B", "explanation": "Truthful reporting is a core PMI obligation. The PM cannot falsify status even at a sponsor's request. Accurate reporting paired with a recovery plan is the ethical and professional response.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a9", "question": "During an audit, a PM finds a predecessor inflated project progress figures. The predecessor has left the company. What should the PM do?", "optionA": "Ignore it since it cannot be changed.", "optionB": "Correct records and inform management of accurate project history.", "optionC": "Report accurate going forward without raising the past.", "optionD": "Report only if the audit specifically asks about historical accuracy.", "correct": "B", "explanation": "Integrity requires correcting known inaccuracies even from predecessors. Concealing known falsifications during an audit makes the PM complicit.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a10", "question": "A PM's team consistently misses targets due to unrealistic management deadlines. Reporting true status will reflect poorly on the department. What is BEST?", "optionA": "Report optimistic data to protect the team.", "optionB": "Report accurate status and use it to discuss realistic planning.", "optionC": "Report the delay but attribute it only to external factors.", "optionD": "Submit the report without comment.", "correct": "B", "explanation": "Accurate data is the basis for improvement. Partial attribution of delays to external factors only (C) is deceptive. The PM's role includes using honest information constructively.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a11", "question": "A project is 40% over budget due to a significantly underestimated initial cost. What should the PM do?", "optionA": "Reduce scope without informing the sponsor to absorb the overrun.", "optionB": "Immediately communicate the financial position to the sponsor and request a budget review.", "optionC": "Spread the overrun across future periods to normalize reports.", "optionD": "Report the overrun only at the next milestone gate.", "correct": "B", "explanation": "A 40% overrun requires immediate transparent disclosure. Hiding it through scope changes (A), accounting manipulation (C), or delay (D) are all forms of financial deception.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a12", "question": "A team member asks the PM to sign off on a timesheet that includes hours worked on a different project. What should the PM do?", "optionA": "Sign since the team member is trustworthy.", "optionB": "Refuse — falsifying timesheets is a serious integrity violation.", "optionC": "Sign but ask the team member not to do it again.", "optionD": "Ask the other PM to authorise it instead.", "correct": "B", "explanation": "Timesheet fraud violates PMI Honesty and is likely illegal. The PM must refuse regardless of amount, trust level, or assurances. Redirecting (D) does not resolve the ethical issue.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a13", "question": "A PM is asked to write a final project report. The project succeeded technically but exceeded budget significantly. An executive suggests softening budget language. What should the PM do?", "optionA": "Follow the executive's guidance.", "optionB": "Document both successes and budget challenges accurately.", "optionC": "Omit the budget section.", "optionD": "Create two versions for different audiences.", "correct": "B", "explanation": "Final reports are governance records used for organisational learning. Softening, omitting, or creating multiple versions are deception. Honest reporting of both successes and failures is essential.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a14", "question": "A PM is asked to give a PMP reference for a former colleague who had significant performance issues. What should the PM do?", "optionA": "Provide a positive reference to support their career.", "optionB": "Decline rather than give a dishonest positive reference.", "optionC": "Provide a truthful reference reflecting both strengths and weaknesses.", "optionD": "Provide a reference only if they have since improved.", "correct": "C", "explanation": "PMI Honesty requires truthful professional references. A misleading positive reference harms the profession and undermines PMP credential integrity. Declining (B) is also ethical if unwilling to give honest feedback.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a15", "question": "At closure, a PM is instructed to document the project as successful for a marketing case study. Three key deliverables were not met. What should the PM do?", "optionA": "Document as requested since leadership approved the narrative.", "optionB": "Document accurately with unmet deliverables and flag the request to compliance.", "optionC": "Document as successful but add a footnote about missing deliverables.", "optionD": "Refuse to complete documentation and escalate.", "correct": "B", "explanation": "Official project documentation must be accurate regardless of external use. A footnote in a 'success' document is still misleading. The PM must document truthfully and report the inappropriate instruction.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a16", "question": "A PM discovers their spouse holds shares in a company bidding on a project contract. What should the PM do FIRST?", "optionA": "Have the spouse sell shares before bidding closes.", "optionB": "Disclose the conflict to management and recuse from vendor selection.", "optionC": "Proceed with objective evaluation scoring.", "optionD": "Have a team member lead evaluation without disclosing the conflict.", "correct": "B", "explanation": "A personal financial interest in a bidding vendor requires immediate disclosure and recusal. The PM cannot manage a conflict of interest independently — management must be informed.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a17", "question": "A vendor bidder turns out to be a company recently founded by a close personal friend. What is MOST appropriate?", "optionA": "Evaluate the friend's company extra carefully to prove impartiality.", "optionB": "Disqualify the friend's company.", "optionC": "Disclose the relationship and let management decide whether to reassign the evaluation.", "optionD": "Proceed since personal friendships should not affect judgment.", "correct": "C", "explanation": "Personal relationships create potential bias that must be disclosed. The decision about reassignment belongs to management, not the PM. Unilateral disqualification without disclosure is also a biased action.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a18", "question": "A PM is simultaneously consulting for a competitor on personal time. The employer has no moonlighting policy. Is this ethical?", "optionA": "Yes — no written policy against it.", "optionB": "Yes — it is done on personal time.", "optionC": "No — working for a competitor creates a conflict requiring disclosure regardless of policy.", "optionD": "Only if different skill sets are used.", "correct": "C", "explanation": "PMI requires disclosure of conflicts of interest even absent explicit policy. Working for a competitor inherently conflicts with the employer's interests and must be disclosed and approved.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a19", "question": "After completing a project, the PM is offered a high-paying job by the vendor whose contract they managed. What should the PM do?", "optionA": "Accept since the project is complete.", "optionB": "Decline to avoid perception of impropriety.", "optionC": "Accept after a waiting period.", "optionD": "Disclose the offer to management and seek guidance.", "correct": "D", "explanation": "Post-project job offers from vendors may constitute a revolving-door conflict. Many organisations have post-employment restrictions. Disclosure and guidance-seeking is the required first step. Simply accepting without disclosure risks a real conflict.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a20", "question": "A PM's brother-in-law owns a firm that may offer the best service for a project need. How should the PM handle including them in bidding?", "optionA": "Include the firm since qualifications should override relationships.", "optionB": "Exclude the firm to avoid any conflict.", "optionC": "Disclose the family relationship and recuse from evaluating that vendor.", "optionD": "Include the firm but score them lower to compensate.", "correct": "C", "explanation": "Family relationships require disclosure and recusal — not vendor exclusion or score manipulation. Both unilateral exclusion and adjusted scoring are biased acts. Fairness requires transparent disclosure and independent evaluation.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a21", "question": "A PM has a performance bonus tied to meeting a project deadline. A quality issue found mid-project will cause a two-week delay and eliminate the bonus. What should the PM do?", "optionA": "Address the quality issue and accept the loss of the bonus.", "optionB": "Deliver on time and fix the quality issue quietly in the next release.", "optionC": "Negotiate the quality standard down.", "optionD": "Have the team work overtime to address both.", "correct": "A", "explanation": "Personal financial gain cannot override professional obligations. Delivering a known defective product to preserve a bonus harms the client and violates PMI Responsibility. Option D may help but does not guarantee quality resolution.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a22", "question": "A PMI member discovers a colleague falsely claims PMP certification on their CV to win contracts. What should the PMI member do?", "optionA": "Ignore it since it does not affect the member's project.", "optionB": "Confront the colleague privately.", "optionC": "Report the violation to PMI and the relevant organisation.", "optionD": "Wait to see if others raise the issue.", "correct": "C", "explanation": "Falsely claiming PMI certification violates the Code of Ethics and harms the profession. PMI members must report such violations. A private confrontation alone is insufficient for credential fraud.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a23", "question": "A PM accepts a project requiring technical expertise significantly beyond their current skills. They plan to learn on the job without disclosing the gap. Is this acceptable?", "optionA": "Yes — all PMs learn on the job.", "optionB": "Only if the gap is closed before it becomes critical.", "optionC": "No — the PM must disclose the gap and arrange appropriate support.", "optionD": "Yes — adding contingency reserve compensates.", "correct": "C", "explanation": "PMI Responsibility requires honesty about competence gaps. Accepting stretch assignments is possible, but disclosure to the sponsor and arrangement of adequate support (SMEs, training) are mandatory. Undisclosed incompetence is unethical.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a24", "question": "A PMP-certified PM has not earned required PDUs as the renewal deadline approaches. What should they do?", "optionA": "Submit false PDU claims to meet the requirement.", "optionB": "Allow the certification to lapse.", "optionC": "Request an extension from PMI citing workload constraints.", "optionD": "Submit partial claims and make up the difference next cycle.", "correct": "C", "explanation": "PMI offers legitimate extension options. False PDU claims (A or D) directly violate Honesty and can result in permanent certification revocation. Lapse (B) is honest but premature if an extension is available.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a25", "question": "A PM applying for PMP lists project hours from work that was primarily administrative. What is the ethical concern?", "optionA": "None — the hours were worked.", "optionB": "This misrepresents experience and violates PMI Honesty.", "optionC": "It is acceptable since PM experience is subjective.", "optionD": "It is only an issue if audited by PMI.", "correct": "B", "explanation": "Misrepresenting experience to meet PMP eligibility violates PMI Honesty regardless of audit likelihood. The ethical obligation exists independently of whether anyone checks.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a26", "question": "A project is in a country where environmental reporting is technically not enforced. The PM's project activities would trigger these requirements. What should the PM do?", "optionA": "Proceed without compliance since requirements are not enforced.", "optionB": "Comply with environmental requirements regardless of enforcement levels.", "optionC": "Comply only if non-compliance would result in fines.", "optionD": "Consult legal counsel and proceed if advised risk is low.", "correct": "B", "explanation": "PMI Responsibility requires compliance with laws regardless of enforcement. The ethical standard is set by the law — not by the enforcement level. A PM must meet the legal requirement even unenforced.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a27", "question": "A PM is leading a multicultural team. A team member from a collectivist culture consistently defers to the group instead of sharing individual expert opinions. What should the PM do?", "optionA": "Insist the team member share individual opinions to align with team norms.", "optionB": "Ignore the difference and treat all team members identically.", "optionC": "Adapt facilitation to create space for culturally comfortable contribution.", "optionD": "Reassign the team member to tasks not requiring group interaction.", "correct": "C", "explanation": "PMI Respect requires cultural sensitivity and adaptive leadership. Forcing cultural conformity is disrespectful. Designing inclusive processes allows diverse team members to contribute effectively.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a28", "question": "During negotiations, the PM's team makes a culturally offensive joke. The client appears uncomfortable. What should the PM do?", "optionA": "Continue and address it after the session.", "optionB": "Immediately and sincerely apologise and adjust interaction style.", "optionC": "Explain it was not intended to offend and move on.", "optionD": "Ignore it since cultural sensitivities should not affect business.", "correct": "B", "explanation": "PMI Respect requires promptly acknowledging cultural missteps. A simple explanation (C) minimises the impact. An immediate genuine apology followed by behavioural change demonstrates professional cultural awareness.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a29", "question": "A team member makes repeated nationality-based derogatory comments. Others are uncomfortable but have not formally complained. What should the PM do?", "optionA": "Wait for a formal complaint before acting.", "optionB": "Speak privately with the offending team member and make clear it is unacceptable.", "optionC": "Report directly to HR immediately.", "optionD": "Address it as a general reminder in the next team meeting.", "correct": "B", "explanation": "The PM does not need a formal complaint to act on discriminatory behaviour. A direct private conversation is the appropriate first step. General reminders are too indirect for a specific ongoing issue.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a30", "question": "The PM disagrees with a legal client business decision that conflicts with personal values but violates no laws or professional standards. What should the PM do?", "optionA": "Refuse to implement the decision.", "optionB": "Implement it while voicing a professional objection once through appropriate channels.", "optionC": "Escalate to executive leadership to have it overturned.", "optionD": "Delay implementation while seeking a compromise.", "correct": "B", "explanation": "PMI Respect requires respecting lawful stakeholder decisions. The PM may voice a professional objection once, then must implement. Personal values do not override client authority in legitimate business matters.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a31", "question": "A PM notices a competent team member is repeatedly passed over for leadership roles apparently due to their accent. The PM is not their direct supervisor. What should the PM do?", "optionA": "Mind their own business — it is a HR matter.", "optionB": "Raise the concern with the appropriate manager or HR as a potential fairness issue.", "optionC": "Speak directly to the team member about the situation.", "optionD": "Wait to see if the pattern continues.", "correct": "B", "explanation": "PMI Fairness requires challenging discriminatory practices regardless of reporting lines. Silence makes the PM complicit in an unfair practice. Raising it through appropriate channels is the professional obligation.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a32", "question": "A PM realises mid-project that a technical approach they recommended is flawed. Reversing course will cost time and resources. What should the PM do?", "optionA": "Continue with the flawed approach to avoid admitting error.", "optionB": "Acknowledge the error, assess impact, and recommend corrective action to the sponsor.", "optionC": "Quietly adjust the approach and hope no one notices the rework.", "optionD": "Attribute the issue to changing requirements.", "correct": "B", "explanation": "Acknowledging professional errors is a core PMI principle. Hiding (C) or misattributing (D) the error are deception. Honest ownership of mistakes combined with a solution builds trust and enables timely recovery.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a33", "question": "A PM provides an estimate in a domain they lack expertise in, without disclosing the gap. The estimate is significantly wrong. What was the ethical failure?", "optionA": "The PM should have refused to estimate.", "optionB": "The PM should have disclosed the gap and engaged SMEs before estimating.", "optionC": "The PM should have added a larger contingency reserve.", "optionD": "The PM should have researched the technology independently.", "correct": "B", "explanation": "The ethical failure was not disclosing the competence gap. PMI Responsibility requires honesty about expertise limitations. Consulting SMEs addresses the gap — a large contingency (C) compensates for error but does not resolve the dishonesty.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a34", "question": "A PMP has not kept current with agile methodologies increasingly used in their industry. What is MOST appropriate per PMI ethics?", "optionA": "Stick to traditional methods where competent.", "optionB": "Actively pursue agile learning to maintain professional competence.", "optionC": "Hire agile coaches and delegate all agile decisions.", "optionD": "Disclose the gap only when assigned an agile project.", "correct": "B", "explanation": "PMI Responsibility includes ongoing professional development. A PM must proactively maintain competence in an evolving field — not wait for assignment to a specific project type before developing skills.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Easy"}, {"id": "a35", "question": "A sponsor threatens the PM's job if a critical scope gap discovered mid-project is not hidden from the client. What should the PM do?", "optionA": "Hide the gap to protect the job then address it later.", "optionB": "Disclose the gap to the client despite the threat.", "optionC": "Negotiate with the sponsor to address the gap without disclosure.", "optionD": "Resign to avoid being implicated.", "correct": "B", "explanation": "Job security cannot override professional integrity. Hiding material scope gaps from a client is deception that harms the client. The PM must disclose. If the threat is real, the PM should document it and seek ethics/legal guidance.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a36", "question": "Management pressures the PM to approve a vendor invoice for undelivered work to use up budget before year-end. What should the PM do?", "optionA": "Approve since management has budget authority.", "optionB": "Refuse to approve payment for undelivered work and document the refusal.", "optionC": "Ask the vendor to backdate delivery to align with the invoice.", "optionD": "Approve and reduce a future payment to compensate.", "correct": "B", "explanation": "Approving payment for undelivered work is fraud regardless of budget reasons. Management authority does not extend to directing financial fraud. Options C and D add further deception. Document the refusal.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a37", "question": "A PM is asked to maintain the same scope and timeline after significant team downsizing. What should the PM do?", "optionA": "Accept and try to make it work.", "optionB": "Comply and report delays only if they materialise.", "optionC": "Formally communicate that scope/timeline must be adjusted for the reduced team.", "optionD": "Reduce quality quietly to accommodate.", "correct": "C", "explanation": "Accepting an impossible constraint without communicating its consequences is dishonest. The PM must formally document and communicate that the scope, timeline, or both must adjust — not deliver poor quality silently.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a38", "question": "A safety-critical component was approved despite failing a quality test due to deadline pressure. It is already installed. What should the PM do?", "optionA": "Document and move on since the decision was already made.", "optionB": "Immediately escalate to safety/quality management and notify the client of the risk.", "optionC": "Wait to see if the component causes issues before raising alarm.", "optionD": "Raise it at the next quality review meeting.", "correct": "B", "explanation": "A safety failure requires immediate escalation — not documentation and waiting. Delay could cause harm. The PM's obligation to protect public safety overrides schedule concerns entirely.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a39", "question": "A manager instructs the PM to exclude a qualified minority candidate from a shortlist to 'maintain team dynamics.' What should the PM do?", "optionA": "Comply since the manager has authority.", "optionB": "Include the candidate and document the instruction to exclude them.", "optionC": "Ask the candidate to reapply for a future opening.", "optionD": "Exclude the candidate but advocate for diversity initiatives separately.", "correct": "B", "explanation": "Excluding a qualified candidate based on personal characteristics is discrimination — a direct PMI Fairness violation. The PM should not comply and must document the improper instruction. Separate advocacy (D) does not address the immediate injustice.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a40", "question": "An influential stakeholder applies political pressure to have a lower-scoring vendor selected. What should the PM do?", "optionA": "Select the politically preferred vendor since stakeholder relationships matter.", "optionB": "Retroactively adjust criteria to justify the preferred vendor.", "optionC": "Document the pressure and escalate to the governance body.", "optionD": "Select the highest-scoring vendor and explain the decision objectively.", "correct": "D", "explanation": "Vendor selection must be based on objective criteria. The PM should apply evaluation results and explain them clearly. If pressure continues, escalation (C) is appropriate. Retroactive criteria changes (B) are a serious integrity violation.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a41", "question": "A PM is pressured by colleagues to overlook a mandatory quality gate because 'everyone does it here.' What should the PM do?", "optionA": "Follow the shortcut since refusing would make the PM unpopular.", "optionB": "Follow it once to observe, then raise it as a process improvement.", "optionC": "Decline to bypass the quality gate and raise the practice as a process risk.", "optionD": "Check if the shortcut has been formally approved before deciding.", "correct": "C", "explanation": "'Everyone does it' is never justification for bypassing mandatory controls. Quality gates protect deliverables and stakeholders. New PMs who observe unsafe practices must decline participation and raise the concern regardless of social pressure.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a42", "question": "A team member shares project technical specifications with their academic supervisor for a research study without organisational approval. What should the PM do?", "optionA": "Allow it since academic research is non-commercial.", "optionB": "Require the team member to stop immediately and report the disclosure.", "optionC": "Ask the team member to get retroactive approval.", "optionD": "Limit future access to sensitive information for that team member only.", "correct": "B", "explanation": "Sharing project specifications without authorisation is a confidentiality breach regardless of recipient intent. The PM must stop the disclosure immediately and report it. Retroactive approval does not reverse the breach.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a43", "question": "A PM is subpoenaed to testify in a legal case involving confidential project records. What should the PM do?", "optionA": "Refuse to testify since the information is confidential.", "optionB": "Comply with the subpoena after consulting the organisation's legal counsel.", "optionC": "Provide only publicly available information.", "optionD": "Request the organisation block the subpoena.", "correct": "B", "explanation": "A legal subpoena creates a lawful obligation superseding internal confidentiality. The PM must comply with the law, but should consult legal counsel to ensure appropriate handling of sensitive information within the legal process.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a44", "question": "A PM moves to a new employer. A colleague asks for details about the previous employer's procurement strategy. What should the PM do?", "optionA": "Share it since it is industry knowledge.", "optionB": "Share it since the PM no longer works there.", "optionC": "Decline — confidentiality obligations to former employers do not expire.", "optionD": "Share only if no NDA was signed.", "correct": "C", "explanation": "PMI Honesty requires protecting confidential information from all employers — past and present — regardless of NDA status. Employment termination does not end confidentiality obligations.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a45", "question": "During a project, the PM learns of a confidential upcoming restructuring. A team member directly asks whether layoffs are coming. What should the PM do?", "optionA": "Share the information to help the team member plan.", "optionB": "Deny any knowledge of changes.", "optionC": "Acknowledge that some information is confidential and cannot be shared.", "optionD": "Tell only that team member and ask them to keep it confidential.", "correct": "C", "explanation": "The PM must maintain confidentiality without lying. Denial (B) is dishonest. Sharing confidential HR information (A or D) violates confidentiality and could cause harm. Honest acknowledgement of the constraint is the ethical middle ground.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a46", "question": "A PM is approached by a journalist asking about the project. The organisation has not authorised media communications. What should the PM do?", "optionA": "Share only publicly available project information.", "optionB": "Decline and direct the journalist to the communications team.", "optionC": "Share information not marked confidential.", "optionD": "Provide a general overview without mentioning financials.", "correct": "B", "explanation": "Unauthorised media communication violates the PM's professional obligation to their organisation even for seemingly benign information. All media inquiries must be routed to the authorised communications function.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a47", "question": "A PM sits on an industry board and learns an upcoming standard will significantly benefit a vendor they are personally invested in. What should the PM do?", "optionA": "Increase the investment before the standard is published.", "optionB": "Recuse from the related standards discussion and disclose the conflict.", "optionC": "Continue participating since board discussions are not subject to conflict rules.", "optionD": "Reduce investment below the legal threshold before participating.", "correct": "B", "explanation": "Using non-public board information for personal investment is insider trading — illegal and unethical. Regardless of legality, the conflict requires disclosure and recusal. Reducing to a threshold does not remove the conflict.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a48", "question": "A PM is assigned to evaluate their own previous project as part of an audit. What is MOST ethical?", "optionA": "Conduct the evaluation since they know the project best.", "optionB": "Decline and recommend an independent reviewer.", "optionC": "Conduct the evaluation with a colleague reviewing the final report.", "optionD": "Conduct evaluation and flag decisions where they had authority.", "correct": "B", "explanation": "Evaluating one's own work creates a self-interest conflict. A credible audit requires independence. The PM should decline and ensure objective third-party review. Peer review reduces but does not eliminate the conflict.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a49", "question": "A PM is asked to lead an international project in a language they do not speak. They have strong PM skills otherwise. What should the PM do?", "optionA": "Accept since language can be managed with translators.", "optionB": "Decline the project entirely.", "optionC": "Accept, disclose the language limitation to the sponsor, and establish a communication plan.", "optionD": "Accept and learn the language during the project.", "correct": "C", "explanation": "Accepting with a known limitation is acceptable if disclosed and mitigated. The PM's skills are valuable; the language gap can be managed with translators. Full disclosure to the sponsor is essential. Accepting without disclosure is dishonest.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a50", "question": "A team member honestly admits they lack the skills to complete their assigned tasks. The deadline is two weeks away. What should the PM do?", "optionA": "Reassign the work without telling the team member.", "optionB": "Appreciate the honesty and work together on a solution — training, pairing, or task reassignment.", "optionC": "Report the team member to HR for misrepresenting skills.", "optionD": "Ask them to try and fix issues after delivery.", "correct": "B", "explanation": "The team member acted ethically by disclosing a gap. The PM should reward that honesty with a constructive response. Punishing honesty (C) creates a culture of silence. Waiting until after delivery (D) risks project quality.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a51", "question": "A PM is aware a competitor wins contracts by falsely claiming ISO certification. The PM's company is losing business as a result. What should the PM do?", "optionA": "Report the fraudulent claim to the certification body and relevant authorities.", "optionB": "Overstate their own company's certifications in retaliation.", "optionC": "Raise it with industry association leadership only.", "optionD": "Ignore it as a commercial matter.", "correct": "A", "explanation": "False certification claims harm clients, the industry, and ethical competitors. Reporting to the certification body is the correct action. Retaliation with similar deception (B) is never justified. Industry association reporting (C) is weaker than direct action.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a52", "question": "A PM is asked to sign a document certifying all safety inspections are complete. One minor inspection is still pending. What should the PM do?", "optionA": "Sign since one minor inspection will not affect overall safety.", "optionB": "Refuse to sign until all inspections are genuinely complete.", "optionC": "Sign with a handwritten note that one inspection is pending.", "optionD": "Ask a team member to complete the inspection then sign.", "correct": "B", "explanation": "Certifying completion when work is incomplete is a false declaration. Even a 'minor' inspection may have legal or safety significance. The PM must refuse to sign until genuinely complete. A note on an incomplete certification document remains a false declaration.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a53", "question": "A project organisation wants to implement a process that is legal but known to cause environmental damage. The PM personally objects but there is no regulatory prohibition. What should the PM do?", "optionA": "Refuse to implement the process.", "optionB": "Implement it and say nothing.", "optionC": "Implement it while formally raising the environmental concern through appropriate internal channels.", "optionD": "Contact a regulatory body to report the organisation.", "correct": "C", "explanation": "PMI Responsibility includes responsibility to society and the environment beyond just legal compliance. The PM should implement the legal decision while formally raising the concern through appropriate internal channels. Unilateral refusal (A) and external reporting (D) go beyond the PM's authority for a legal activity.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a54", "question": "A PM discovers that a key stakeholder has been sharing selective project updates to manipulate other stakeholders' support. What should the PM do?", "optionA": "Ignore it since stakeholder politics are inevitable.", "optionB": "Address the stakeholder directly and establish a transparent communication protocol.", "optionC": "Share counter-narratives with other stakeholders.", "optionD": "Escalate immediately to senior management.", "correct": "B", "explanation": "Selective information sharing to manipulate stakeholders undermines project integrity. The PM should address the behaviour directly and establish structured, transparent communication protocols accessible to all stakeholders. Counter-narratives (C) compound the problem.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a55", "question": "During a retrospective, a team member reveals that the previous sprint's velocity was inflated to meet a management target. What should the PM do?", "optionA": "Note it and ensure it does not happen again.", "optionB": "Correct the historical record and report the inflation to the appropriate stakeholders.", "optionC": "Keep it within the team to avoid undermining trust.", "optionD": "Address it in the next sprint planning without formal reporting.", "correct": "B", "explanation": "Inflated velocity metrics mislead stakeholders and undermine agile transparency — a core PMI value. Correcting records and reporting to appropriate stakeholders is required. Keeping it internal (C) and informal handling (D) conceal a known deception.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Medium"}, {"id": "a56", "question": "A PM is the only person aware that a recently awarded contract contains terms that heavily favour the vendor due to an oversight during negotiation. Raising it will cause significant rework. What should the PM do?", "optionA": "Say nothing — the contract is signed.", "optionB": "Raise the issue with legal and management immediately so the organisation can make an informed decision.", "optionC": "Quietly monitor to see if the terms cause problems.", "optionD": "Renegotiate informally with the vendor without management's knowledge.", "correct": "B", "explanation": "A PM who becomes aware of a significant contractual disadvantage has a professional duty to disclose it — regardless of the rework it may cause. The organisation has the right to make informed decisions about whether and how to address it. Concealment (A or C) harms the organisation.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}, {"id": "a57", "question": "A project manager is pressured by HR to provide only a neutral reference for a high-performing former employee because 'it is company policy.' The employee deserves a strong reference. What should the PM do?", "optionA": "Provide only the neutral reference as instructed.", "optionB": "Provide a strong reference since the employee deserves it.", "optionC": "Decline to provide the reference and advise the employee of the policy.", "optionD": "Provide the neutral reference officially but informally communicate the employee's strengths.", "correct": "C", "explanation": "If company policy restricts reference content, the most ethical response is to decline to give the reference and advise the employee so they can seek alternative references. Providing an official neutral reference while giving informal strong references (D) undermines the policy and could expose the organisation to liability.", "domain": "PMI Mindset & Professional Ethics", "difficulty": "Hard"}]};

// Detect if opened as a user link
// Format: index.html#user=ID&name=Ahmed&tn=TrainerName&tc=Credentials&tw=WhatsApp&tp=Phone&te=Email&ts=Website&tl=LinkedIn&tb=Bio
var _activeUserId = null;
var _activeUserName = '';
var _trainerInfo = null;

(function() {
  var hash = (window.location.hash || '').replace(/^#/, '');
  if (!hash) return;
  var params = {};
  hash.split('&').forEach(function(p) {
    var eq = p.indexOf('=');
    if (eq > 0) {
      var key = p.slice(0, eq);
      var val = p.slice(eq + 1);
      try { params[key] = decodeURIComponent(val); } catch(e) { params[key] = val; }
    }
  });
  if (!params.user) return;
  _activeUserId   = params.user;
  _activeUserName = params.name || 'Student';
  // Read individual trainer params — simple and reliable
  if (params.tn || params.tw || params.te || params.tp) {
    _trainerInfo = {
      name:        params.tn  || '',
      credentials: params.tc  || '',
      company:     params.tco || '',
      whatsapp:    params.tw  || '',
      phone:       params.tp  || '',
      email:       params.te  || '',
      website:     params.ts  || '',
      linkedin:    params.tl  || '',
      bio:         params.tb  || '',
      photo_url:   params.tu  || ''
    };
  }
})();

// User-specific storage key
function userStoreKey(uid) { return 'pmp_user_' + uid; }

// Active user data (loaded separately when in user mode)
var USER_DATA = {
  history: [],
  notes: [],
  banks: [],
  exam: null,
  lastResult: null,
  _showResults: false
};

// Questions available to this user = built-in bank + their own uploaded banks
function userActiveQuestions() {
  var qs = [];
  if (typeof BUILTIN_BANK !== 'undefined' && BUILTIN_BANK.questions && BUILTIN_BANK.questions.length) {
    qs = qs.concat(BUILTIN_BANK.questions);
  }
  (USER_DATA.banks || []).forEach(function(b) { if (b.active) qs = qs.concat(b.questions); });
  return qs;
}

function saveUserData() {
  if (!_activeUserId) return;
  try { localStorage.setItem(userStoreKey(_activeUserId), JSON.stringify(USER_DATA)); } catch(e) {}
}

function loadUserData() {
  if (!_activeUserId) return;
  try {
    var raw = localStorage.getItem(userStoreKey(_activeUserId));
    if (raw) Object.assign(USER_DATA, JSON.parse(raw));
  } catch(e) {}
}

var APP = {
  page: 'dashboard',
  theme: 'light',
  trainer: {
    name: 'Trainer', credentials: 'PMP®', bio: '',
    phone: '', whatsapp: '', email: '', website: '', linkedin: '',
    company: '', logo: '', photo: '',
    copyright: '© 2025 PMP Exam Accelerator'
  },
  banks: [],
  history: [],
  exam: null,       // active exam object
  lastResult: null, // result of last finished exam
  users: []         // [{id, name, avatar, createdAt, notes:[{id,text,date}]}]
};

function saveApp() {
  try {
    var copy = Object.assign({}, APP);
    if (copy.exam) {
      copy.exam = Object.assign({}, copy.exam);
      copy.exam.flagged = copy.exam.flagged ? Array.from(copy.exam.flagged) : [];
    }
    localStorage.setItem(STORE_KEY, JSON.stringify(copy));
  } catch(e) {}
}

function loadApp() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    Object.assign(APP, saved);
    if (APP.exam && APP.exam.flagged && !Array.isArray(APP.exam.flagged)) {
      APP.exam.flagged = [];
    }
  } catch(e) {}
}

function applyTheme() {
  if (APP.theme === 'dark') {
    document.documentElement.classList.add('dark');
    var btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = '☀️';
  } else {
    document.documentElement.classList.remove('dark');
    var btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = '🌙';
  }
}
function toggleTheme() {
  APP.theme = APP.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveApp();
}

//  SIDEBAR
// ─────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
function updateSidebar() {
  var t = APP.trainer;
  var n = document.getElementById('sb-name');
  var c = document.getElementById('sb-creds');
  var p = document.getElementById('sb-photo');
  var l = document.getElementById('sb-logo');
  if (n) n.textContent = t.name || 'Trainer';
  if (c) c.textContent = t.credentials || '';
  if (p) p.innerHTML = t.photo ? '<img src="' + t.photo + '" style="width:100%;height:100%;object-fit:cover" />' : (t.name || 'T').charAt(0).toUpperCase();

function goPage(page) {

  ['dashboard','simulator','questionbank','analytics','users','profile','contact'].forEach(function(p) {

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }
function fmtTime(sec) {
  if (!sec) return '—';
  var m = Math.floor(sec / 60), s = sec % 60;
  return m + 'm ' + s + 's';
}
function fmtTimer(sec) {
  var m = Math.floor(sec / 60), s = sec % 60;
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}
function activeQuestions() {
  var qs = [];
  APP.banks.forEach(function(b) { if (b.active) qs = qs.concat(b.questions); });
  return qs;
}
function doSearch(val) {
  if (val && val.length > 2) {
    goPage('questionbank');
    setTimeout(function() {
      var el = document.getElementById('qb-search');
      if (el) { el.value = val; filterQB(); }
    }, 100);
  }
}

function filterQB() {
  var q = (document.getElementById('qb-search') ? document.getElementById('qb-search').value : '').toLowerCase();
  var dom = document.getElementById('qb-domain') ? document.getElementById('qb-domain').value : '';
  var dif = document.getElementById('qb-diff') ? document.getElementById('qb-diff').value : '';
  var all = activeQuestions().filter(function(x) {
    if (q && !(x.question || '').toLowerCase().includes(q)) return false;
    if (dom && x.domain !== dom) return false;
    if (dif && x.difficulty !== dif) return false;
    return true;
  });
  var list = document.getElementById('qb-list');
  var cnt  = document.getElementById('qb-count');
  if (!list) return;
  list.innerHTML = all.slice(0, 30).map(function(x, i) {
    return '<div class="border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm">' +
      '<div class="flex items-center gap-2 mb-1 text-xs text-gray-400">' +
        '<span>#' + (i+1) + '</span>' +
        (x.domain ? '<span class="badge badge-blue">' + esc(x.domain) + '</span>' : '') +
        (x.difficulty ? '<span class="badge ' + (x.difficulty==='Hard'?'badge-red':x.difficulty==='Easy'?'badge-green':'badge-orange') + '">' + esc(x.difficulty) + '</span>' : '') +
      '</div>' +
      '<div class="font-medium mb-2">' + esc(x.question) + '</div>' +
      '<div class="grid sm:grid-cols-2 gap-1">' +
        ['A','B','C','D'].map(function(l) {
          var t = x['option' + l];
          return t ? '<div class="text-xs py-1 px-2 rounded ' + (x.correct === l ? 'bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-semibold' : '') + '">' + l + '. ' + esc(t) + '</div>' : '';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('');
  if (cnt) cnt.textContent = 'Showing ' + Math.min(30, all.length) + ' of ' + all.length + ' questions';
}

function doMergeBanks() {
  var name = (document.getElementById('merge-name') || {value:'Merged Bank'}).value.trim() || 'Merged Bank';
  var selected = APP.banks.filter(function(b) {
    var cb = document.getElementById('merge-cb-' + b.id);
    return cb && cb.checked;
  });
  if (selected.length < 2) { alert('Select at least 2 banks to merge.'); return; }
  // Deduplicate by question text
  var seen = {}, merged = [];
  selected.forEach(function(b) {
    b.questions.forEach(function(q) {
      var key = (q.question || '').trim().toLowerCase().slice(0, 80);
      if (!seen[key]) { seen[key] = true; merged.push(Object.assign({}, q, { id: uid() })); }
    });
  });
  var selectedIds = selected.map(function(b) { return b.id; });
  APP.banks = APP.banks.filter(function(b) { return selectedIds.indexOf(b.id) === -1; });
  APP.banks.push({ id: uid(), name: name, active: true, questions: merged, date: new Date().toISOString() });
  saveApp();
  closeModal();
  goPage('questionbank');
}

function handleUploadFile(input) {
  var file = input.files[0];
  if (!file) return;
  document.getElementById('up-label').textContent = file.name;
  var ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'docx' || ext === 'doc') {
    var reader = new FileReader();
    reader.onload = function(e) {
      if (!window.mammoth) { alert('mammoth.js not loaded. Please wait a moment and retry.'); return; }
      mammoth.extractRawText({ arrayBuffer: e.target.result }).then(function(res) {
        _uploadData = parseDocxText(res.value);
        showPreview(_uploadData);
      }).catch(function(err) { alert('Could not read Word file: ' + err.message); });
    };
    reader.readAsArrayBuffer(file);
    return;
  }

  var upLabel = document.getElementById('up-label');
  if (upLabel) upLabel.textContent = '⏳ Reading ' + file.name + '…';
  _uploadData = null;

  function processText(text) {
    try {
      // Strip BOM if present
      text = text.replace(/^﻿/, '');
      var rows;
      if (ext === 'json') {
        var parsed = JSON.parse(text);
        if (Array.isArray(parsed)) {
          rows = parsed;
        } else if (typeof parsed === 'object' && parsed !== null) {
          var keys = Object.keys(parsed);
          for (var ki = 0; ki < keys.length; ki++) {
            if (Array.isArray(parsed[keys[ki]])) { rows = parsed[keys[ki]]; break; }
          }
          if (!rows) rows = [parsed];
        }
      } else {
        rows = Papa.parse(text, { header: true, skipEmptyLines: true }).data;
      }
      if (!rows || !rows.length) { alert('File appears empty. Check the file has data.'); return; }
      _uploadData = rows.map(normalizeRow);
      if (upLabel) upLabel.textContent = '✅ ' + file.name + ' — ' + _uploadData.length + ' rows found';
      showPreview(_uploadData);
    } catch(err) {
      if (upLabel) upLabel.textContent = file.name;
      alert('Could not parse file.\n\nError: ' + err.message + '\n\nMake sure the file is valid JSON or CSV.');
    }
  }

  function processBinary(buf) {
    try {
      var wb = XLSX.read(buf, { type: 'array' });
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      if (!rows || !rows.length) { alert('Excel file appears empty.'); return; }
      _uploadData = rows.map(normalizeRow);
      if (upLabel) upLabel.textContent = '✅ ' + file.name + ' — ' + _uploadData.length + ' rows found';
      showPreview(_uploadData);
    } catch(err) {
      if (upLabel) upLabel.textContent = file.name;
      alert('Could not read Excel file.\n\nError: ' + err.message);
    }
  }

  if (ext === 'xlsx' || ext === 'xls') {
    var r = new FileReader();
    r.onerror = function() { if(upLabel) upLabel.textContent = file.name; alert('Cannot read this file.\n\nOn iPhone: open the file in the Files app, make sure it is downloaded (no cloud icon), then try again.'); };
    r.onload = function(e) { processBinary(new Uint8Array(e.target.result)); };
    r.readAsArrayBuffer(file);
  } else {
    var r = new FileReader();
    r.onerror = function() { if(upLabel) upLabel.textContent = file.name; alert('Cannot read this file.\n\nOn iPhone: open the file in the Files app first, make sure it shows as downloaded (no cloud ☁ icon next to it), then try uploading again.'); };
    r.onload = function(e) { processText(e.target.result); };
    r.readAsText(file, 'UTF-8');
  }
}

function doImport() {
  var name = (document.getElementById('up-name') ? document.getElementById('up-name').value.trim() : '') || 'Imported Bank';
  if (!_uploadData || !_uploadData.length) { alert('Select a valid file first.'); return; }
  var valid = _uploadData.filter(function(q) { return q.question && (q.optionA || q.optionB) && q.correct; });
  if (!valid.length) {
    // Show helpful debug info
    var sample = _uploadData[0] || {};
    var keys = Object.keys(sample).join(', ');
    alert('No valid questions found.\n\nColumns detected in your file:\n' + (keys || '(none)') + '\n\nRequired columns:\nquestion, optionA, optionB, optionC, optionD, correct');
    return;
  }
  // Warn if some rows were skipped
  if (valid.length < _uploadData.length) {
    var skipped = _uploadData.length - valid.length;
    if (!confirm('Imported ' + valid.length + ' questions (' + skipped + ' rows skipped — missing question or answer). Continue?')) return;
  }
  APP.banks.push({ id: uid(), name: name, active: true, questions: valid, date: new Date().toISOString() });
  _uploadData = null;
  saveApp();
  closeModal();
  goPage('questionbank');
}

function normalizeRow(row) {
  // Build a lowercase→original key lookup for flexible matching
  var rowLower = {};
  Object.keys(row).forEach(function(k) { rowLower[k.trim().toLowerCase().replace(/[\s_\-]+/g,'')] = k; });

  function get(aliases) {
    for (var i = 0; i < aliases.length; i++) {
      var a = aliases[i];
      // exact match first
      if (row[a] !== undefined && String(row[a]).trim() !== '') return String(row[a]).trim();
      // case-insensitive / space-stripped match
      var aLow = a.toLowerCase().replace(/[\s_\-]+/g,'');
      if (rowLower[aLow] !== undefined) {
        var val = row[rowLower[aLow]];
        if (val !== undefined && String(val).trim() !== '') return String(val).trim();
      }
    }
    return undefined;
  }

  var r = { id: uid(), difficulty: 'Medium', domain: 'General' };

  r.question    = get(['question','Question','QUESTION','السؤال','سؤال','Q','q']);
  r.optionA     = get(['optionA','option_a','OptionA','Option A','Choice A','A','a','choice1','option1','إجابة أ','أ']);
  r.optionB     = get(['optionB','option_b','OptionB','Option B','Choice B','B','b','choice2','option2','إجابة ب','ب']);
  r.optionC     = get(['optionC','option_c','OptionC','Option C','Choice C','C','c','choice3','option3','إجابة ج','ج']);
  r.optionD     = get(['optionD','option_d','OptionD','Option D','Choice D','D','d','choice4','option4','إجابة د','د']);
  r.correct     = get(['correct','Correct','answer','Answer','correct_answer','CorrectAnswer','الإجابة الصحيحة','الصحيح','key']);
  r.explanation = get(['explanation','Explanation','rationale','Rationale','justification','الشرح','التفسير','reason']);
  r.domain      = get(['domain','Domain','knowledge_area','KnowledgeArea','topic','Topic','area','Area','category','المجال','الموضوع']);
  r.difficulty  = get(['difficulty','Difficulty','level','Level','المستوى','الصعوبة']);

  // Positional fallback: if question still missing, try first column; options try columns 2-5
  if (!r.question) {
    var cols = Object.keys(row);
    if (cols.length >= 5) {
      r.question = r.question || String(row[cols[0]] || '').trim();
      r.optionA  = r.optionA  || String(row[cols[1]] || '').trim();
      r.optionB  = r.optionB  || String(row[cols[2]] || '').trim();
      r.optionC  = r.optionC  || String(row[cols[3]] || '').trim();
      r.optionD  = r.optionD  || String(row[cols[4]] || '').trim();
      r.correct  = r.correct  || String(row[cols[5]] || '').trim();
    }
  }

  // Normalize correct answer to single letter A/B/C/D
  if (r.correct) {
    var c = r.correct.toUpperCase().trim();
    if (/^[ABCD]/.test(c)) r.correct = c[0];
    else if (c === '1') r.correct = 'A';
    else if (c === '2') r.correct = 'B';
    else if (c === '3') r.correct = 'C';
    else if (c === '4') r.correct = 'D';
  }

  return r;
}

function parseDocxText(text) {
  var lines = text.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var questions = [];
  var i = 0;
  while (i < lines.length) {
    var line = lines[i];
    var nm = line.match(/^(\d+)[.)]\s+(.+)/);
    var lm = line.match(/^[Qq]uestion\s*[:.\-]\s*(.+)/);
    if (!nm && !lm) { i++; continue; }

    var q = { id: uid(), question: (nm ? nm[2] : lm[1]).trim(), optionA:'', optionB:'', optionC:'', optionD:'', correct:'', explanation:'', domain:'General', difficulty:'Medium' };
    i++;

    // Multi-line question
    while (i < lines.length && !lines[i].match(/^[A-Da-d][.)]/i) && !lines[i].match(/^(answer|correct|explanation|domain|difficulty)/i) && !lines[i].match(/^\d+[.)]/)) {
      q.question += ' ' + lines[i]; i++;
    }

    // Options
    var optMap = { a:'optionA', b:'optionB', c:'optionC', d:'optionD' };
    while (i < lines.length) {
      var om = lines[i].match(/^([A-Da-d])[.)]\s+(.+)/i);
      if (!om) break;
      q[optMap[om[1].toLowerCase()]] = om[2].trim(); i++;
    }

    // Metadata
    while (i < lines.length) {
      var l = lines[i];
      var am = l.match(/^(?:answer|correct\s*answer)\s*[:.\-]\s*([A-Da-d])/i);
      var em = l.match(/^(?:explanation|rationale)\s*[:.\-]\s*(.+)/i);
      var dm = l.match(/^(?:domain|topic|area)\s*[:.\-]\s*(.+)/i);
      var fm = l.match(/^(?:difficulty|level)\s*[:.\-]\s*(.+)/i);
      if (am) { q.correct = am[1].toUpperCase(); i++; }
      else if (em) {
        q.explanation = em[1].trim(); i++;
        while (i < lines.length && !lines[i].match(/^(domain|difficulty|answer|\d+[.)]\s)/i)) {
          q.explanation += ' ' + lines[i].trim(); i++;
        }
      }
      else if (dm) { q.domain = dm[1].trim(); i++; }
      else if (fm) { var dv=fm[1].trim(); q.difficulty=/hard/i.test(dv)?'Hard':/easy/i.test(dv)?'Easy':'Medium'; i++; }
      else break;
    }

    if (q.question && q.optionA) questions.push(q);
  }
  return questions;
}

function updatePracticePreview() {
  var dom  = (document.getElementById('c-practice-domain') || {value:''}).value;
  var diff = (document.getElementById('c-practice-diff')   || {value:''}).value;
  var num  = parseInt((document.getElementById('c-practice-num') || {value:'20'}).value) || 20;
  var pool = activeQuestions().filter(function(q){
    if (dom  && q.domain    !== dom)  return false;
    if (diff && q.difficulty !== diff) return false;
    return true;
  });
  var countEl = document.getElementById('practice-count');
  if (countEl) countEl.textContent = pool.length + ' questions match — will practice ' + Math.min(num, pool.length);

  var listEl = document.getElementById('practice-preview-list');
  if (!listEl) return;
  if (!pool.length) {
    listEl.innerHTML = '<div class="text-xs text-gray-400 text-center py-3">No questions match these filters</div>';
    return;
  }
  listEl.innerHTML = pool.slice(0, 5).map(function(q, i) {
    return '<div style="padding:.4rem 0;border-bottom:1px solid #f1f5f9;font-size:.78rem">' +
      '<div style="display:flex;gap:.4rem;margin-bottom:.2rem">' +
        (q.domain ? '<span class="badge badge-blue" style="font-size:.62rem">' + esc(q.domain) + '</span>' : '') +
        (q.difficulty ? '<span class="badge ' + (q.difficulty==='Hard'?'badge-red':q.difficulty==='Easy'?'badge-green':'badge-orange') + '" style="font-size:.62rem">' + esc(q.difficulty) + '</span>' : '') +
      '</div>' +
      '<div class="font-medium" style="color:#0A2342;line-height:1.35">' + (i+1) + '. ' + esc((q.question||'').slice(0,100)) + (q.question&&q.question.length>100?'…':'') + '</div>' +
    '</div>';
  }).join('') +
  (pool.length > 5 ? '<div class="text-xs text-gray-400 text-center py-2">+ ' + (pool.length-5) + ' more questions</div>' : '');
}

function selectMode(m) {
  _selectedMode = m;
  ['A','B','C'].forEach(function(x) {
    var card  = document.getElementById('mode-' + x);
    var check = document.getElementById('mode-check-' + x);
    var bOpts = document.getElementById('mode-B-opts');
    var cOpts = document.getElementById('mode-C-opts');
    if (card)  card.classList.toggle('active', x === m);
    if (check) check.style.display = x === m ? 'block' : 'none';
    if (x === 'B' && bOpts) bOpts.style.display = m === 'B' ? 'grid' : 'none';
    if (x === 'C' && cOpts) cOpts.style.display = m === 'C' ? 'block' : 'none';
  });
  if (m === 'C') setTimeout(updatePracticePreview, 30);
  var hint = document.getElementById('mode-hint');
  var labels = { A: 'Full PMP Exam selected', B: 'Custom Exam selected — set options above', C: 'Practice Mode selected — choose filters below' };
  if (hint) hint.textContent = '✓ ' + (labels[m] || m);
}

function toggleBankCB(id, active) {
  var b = APP.banks.find(function(x){return x.id===id;});
  if (b) { b.active = active; saveApp(); }
  var qs = activeQuestions();
  var el = document.getElementById('bank-total');
  if (el) el.textContent = qs.length + ' questions available';
  var numEl = document.getElementById('c-num');
  if (numEl) { numEl.max = qs.length; if (parseInt(numEl.value) > qs.length) numEl.value = qs.length; }
}

function startExam() {
  var pool = activeQuestions();
  if (!pool.length) { alert('No questions available. Upload a question bank first.'); goPage('questionbank'); return; }

  var numQ = 60, timeSec = 90 * 60, mode = 'Custom', isPractice = false;

  if (_selectedMode === 'A') {
    numQ = Math.min(180, pool.length); timeSec = 230 * 60; mode = 'Full PMP';
  } else if (_selectedMode === 'B') {
    var nEl = document.getElementById('c-num');
    var tEl = document.getElementById('c-time');
    var dEl = document.getElementById('c-domain');
    var fEl = document.getElementById('c-diff');
    numQ = Math.min(parseInt(nEl ? nEl.value : 60) || 60, pool.length);
    timeSec = (parseInt(tEl ? tEl.value : 90) || 90) * 60;
    var dom = dEl ? dEl.value : '';
    var dif = fEl ? fEl.value : '';
    if (dom) pool = pool.filter(function(q){return q.domain === dom;});
    if (dif) pool = pool.filter(function(q){return q.difficulty === dif;});
    mode = 'Custom';
  } else {
    var pdEl  = document.getElementById('c-practice-domain');
    var pfEl  = document.getElementById('c-practice-diff');
    var pnEl  = document.getElementById('c-practice-num');
    var pDom  = pdEl ? pdEl.value : '';
    var pDiff = pfEl ? pfEl.value : '';
    if (pDom)  pool = pool.filter(function(q){ return q.domain    === pDom;  });
    if (pDiff) pool = pool.filter(function(q){ return q.difficulty === pDiff; });
    numQ = Math.min(parseInt(pnEl ? pnEl.value : 20) || 20, pool.length);
    timeSec = 0; isPractice = true; mode = 'Practice';
  }

  if (!pool.length) { alert('No questions match those filters. Try different options.'); return; }
  numQ = Math.min(numQ, pool.length);

  var questions = shuffle(pool).slice(0, numQ);
  APP.exam = {
    id: uid(), mode: mode, isPractice: isPractice,
    startTime: Date.now(), timeSec: timeSec,
    questions: questions, current: 0,
    answers: {}, flagged: []
  };
  APP.lastResult = null;
  APP._showResults = false;
  saveApp();
  goPage('simulator');
}

    '<div id="ans-panel"></div>' +

    '<div class="flex items-center justify-between flex-wrap gap-3">' +

        ex.questions.map(function(_, idx) {
          var isAns = ex.answers[idx] !== undefined;

function renderOptions(q, ex) {
  var letters = ['A','B','C','D'];
  var selected = ex.answers[ex.current];
  var showResult = ex.isPractice && selected !== undefined && _autoReveal;
  return letters.map(function(l) {
    var text = q['option' + l];
    if (!text) return '';
    var cls = '';
    if (showResult) {
      if (l === q.correct) cls = 'ok';
      else if (l === selected) cls = 'bad';
    } else if (l === selected) {
      cls = 'sel';
    }
    var disabled = (showResult || (!ex.isPractice && selected !== undefined)) ? 'disabled' : '';
    return '<button class="opt ' + cls + '" onclick="pickAnswer(\'' + l + '\')" ' + disabled + '>' +
      '<span class="opt-key">' + l + '</span>' +
      '<span>' + esc(text) + '</span>' +
    '</button>';
  }).join('');
}

function pickAnswer(letter) {
  var ex = APP.exam;
  if (!ex) return;
  if (ex.answers[ex.current] !== undefined) return; // already answered
  ex.answers[ex.current] = letter;
  saveApp();
  // Re-render options
  var optsEl = document.getElementById('opts');
  if (optsEl) optsEl.innerHTML = renderOptions(ex.questions[ex.current], ex);
  // Practice mode: show answer based on toggle
  if (ex.isPractice) {
    var panel = document.getElementById('ans-panel');
    if (_autoReveal) {
      showAnswerPanel(ex.questions[ex.current], letter);
    } else {
      if (panel) panel.innerHTML = showAnswerBtn();
    }
  }
}

function showAnswerPanel(q, selected) {
  var panel = document.getElementById('ans-panel');
  if (!panel) return;
  var correct = q.correct;
  var isRight = selected === correct;
  var borderColor = isRight ? '#2E8B57' : '#D62828';
  var bgColor = isRight ? '#f0fdf4' : '#fff5f5';

  panel.innerHTML =
    '<div class="card p-5" style="border-left:4px solid ' + borderColor + ';background:' + bgColor + '" id="explanation-card">' +
      '<div class="flex items-center gap-2 mb-3">' +
        '<span style="font-size:1.25rem">' + (isRight ? '✅' : '❌') + '</span>' +
        '<span class="font-bold">' + (isRight ? 'Correct!' : 'Incorrect — Correct answer: ' + correct) + '</span>' +
      '</div>' +
      '<button onclick="toggleExplanation()" class="text-sm font-semibold" style="color:#0A2342;background:none;border:none;cursor:pointer;padding:0">▼ Show PMI Explanation</button>' +
      '<div id="exp-body" class="collapsible">' +
        '<div class="mt-4 space-y-3 text-sm">' +
          (q.explanation ? '<div><div class="lbl mb-1">Explanation</div><div class="leading-relaxed">' + esc(q.explanation) + '</div></div>' : '') +
          '<div><div class="lbl mb-1">PMI Mindset</div><div class="leading-relaxed text-gray-600 dark:text-gray-300">PMI emphasizes proactive, ethical, stakeholder-centric project management. This question tests ' + esc(q.domain || 'project management') + ' knowledge.</div></div>' +
          '<div class="space-y-1">' +
            ['A','B','C','D'].map(function(l) {
              var t = q['option' + l];
              if (!t) return '';
              var ok = l === correct;
              return '<div class="text-xs ' + (ok ? 'text-green-700 dark:text-green-400' : 'text-gray-500') + '"><strong>' + l + '.</strong> ' + esc(t) + ' — ' + (ok ? '✓ Correct answer' : '✗ Incorrect') + '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function toggleExplanation() {
  var body = document.getElementById('exp-body');
  if (!body) return;
  body.classList.toggle('open');
  // update button text
  var card = document.getElementById('explanation-card');
  if (card) {
    var btn = card.querySelector('button');
    if (btn) btn.textContent = body.classList.contains('open') ? '▲ Hide Explanation' : '▼ Show PMI Explanation';
  }
}

function toggleFlag(idx) {
  var ex = APP.exam;
  if (!ex) return;
  var arr = ex.flagged || [];
  var pos = arr.indexOf(idx);
  if (pos === -1) arr.push(idx); else arr.splice(pos, 1);
  ex.flagged = arr;
  saveApp();
  var btn = document.getElementById('flag-btn-' + idx);
  if (btn) btn.textContent = pos === -1 ? '🚩 Flagged' : '⚑ Flag';
  goPage('simulator'); // re-render to update nav dots
}

function navQ(dir) {
  var ex = APP.exam;
  if (!ex) return;
  var next = ex.current + dir;
  if (next < 0 || next >= ex.questions.length) return;
  ex.current = next;
  saveApp();
  goPage('simulator');
}

function jumpQ(idx) {
  var ex = APP.exam;
  if (!ex) return;
  ex.current = idx;
  saveApp();
  goPage('simulator');
}

// Timer
function startTimer() {
  if (_timerInterval) clearInterval(_timerInterval);
  var ex = APP.exam;
  if (!ex || ex.isPractice || !ex.timeSec) return;
  function tick() {
    var el = document.getElementById('exam-timer');
    if (!el) { clearInterval(_timerInterval); return; }
    var elapsed = Math.floor((Date.now() - ex.startTime) / 1000);
    var rem = ex.timeSec - elapsed;
    if (rem <= 0) { clearInterval(_timerInterval); finishExam(); return; }
    el.textContent = '⏱ ' + fmtTimer(rem);
    el.className = 'font-bold text-lg ' + (rem < 600 ? 'timer-warn' : 'text-navy dark:text-blue-400');
  }
  tick();
  _timerInterval = setInterval(tick, 1000);
}

function confirmFinish() {
  var ex = APP.exam;
  if (!ex) return;
  var unanswered = ex.questions.length - Object.keys(ex.answers).length;
  if (unanswered > 0 && !confirm(unanswered + ' question(s) not answered. Finish the exam anyway?')) return;
  finishExam();
}

function finishExam() {
  clearInterval(_timerInterval);
  var ex = APP.exam;
  if (!ex) return;
  var elapsed = Math.floor((Date.now() - ex.startTime) / 1000);
  var correct = 0;
  var domain_scores = {};
  ex.questions.forEach(function(q, i) {
    var ans = ex.answers[i];
    var right = ans === q.correct;
    if (right) correct++;
    var d = q.domain || 'General';
    if (!domain_scores[d]) domain_scores[d] = { correct: 0, total: 0 };
    domain_scores[d].total++;
    if (right) domain_scores[d].correct++;
  });
  var score = pct(correct, ex.questions.length);
  var result = {
    id: ex.id, date: new Date().toISOString(), mode: ex.mode,
    score: score, correct: correct, total: ex.questions.length,
    duration: elapsed, domain_scores: domain_scores,
    questions: ex.questions, answers: ex.answers
  };
  APP.history.push({ id:result.id, date:result.date, mode:result.mode, score:result.score, correct:result.correct, total:result.total, duration:result.duration, domain_scores:result.domain_scores });
  APP.lastResult = result;
  APP._showResults = true;
  APP.exam = null;
  saveApp();
  goPage('simulator');
}

function printResults() { window.print(); }

function exportResultsPDF() {
  var r = APP.lastResult;
  if (!r || typeof window.jspdf === 'undefined') {
    // Fallback: print
    window.print();
    return;
  }
  try {
    var doc = new window.jspdf.jsPDF();
    var t = APP.trainer;
    var y = 18;
    // Header
    doc.setFontSize(16); doc.setFont(undefined,'bold');
    doc.text('PMP EXAM ACCELERATOR', 105, y, {align:'center'}); y += 7;
    doc.setFontSize(10); doc.setFont(undefined,'normal');
    if (t.name) { doc.text(t.name + (t.credentials?' · '+t.credentials:''), 105, y, {align:'center'}); y += 5; }
    doc.setDrawColor(180); doc.line(14, y, 196, y); y += 8;
    // Score
    doc.setFontSize(13); doc.setFont(undefined,'bold');
    doc.text('Exam Results — ' + new Date(r.date).toLocaleDateString(), 14, y); y += 8;
    doc.setFontSize(24); doc.setFont(undefined,'bold');
    var scoreColor = r.score >= 70 ? [46,139,87] : [214,40,40];
    doc.setTextColor(scoreColor[0], scoreColor[1], scoreColor[2]);
    doc.text(r.score.toFixed(1) + '%  ' + (r.score >= 70 ? 'PASSED' : 'KEEP PRACTICING'), 105, y, {align:'center'}); y += 10;
    doc.setTextColor(0,0,0); doc.setFontSize(10); doc.setFont(undefined,'normal');
    doc.text('Mode: ' + r.mode + '   |   Correct: ' + r.correct + '/' + r.total + '   |   Duration: ' + fmtTime(r.duration), 105, y, {align:'center'}); y += 10;
    // Domain scores
    var doms = Object.keys(r.domain_scores || {});
    if (doms.length) {
      doc.setFontSize(11); doc.setFont(undefined,'bold');
      doc.text('Domain Performance', 14, y); y += 6;
      doc.setFontSize(9); doc.setFont(undefined,'normal');
      doms.forEach(function(d) {
        var ds = r.domain_scores[d];
        var p = pct(ds.correct, ds.total);
        var col = p >= 70 ? [46,139,87] : [214,40,40];
        doc.setTextColor(col[0],col[1],col[2]);
        doc.text('• ' + d + ': ' + p + '% (' + ds.correct + '/' + ds.total + ')', 18, y);
        y += 5;
        if (y > 270) { doc.addPage(); y = 18; }
      });
      doc.setTextColor(0,0,0); y += 3;
    }
    // Question review
    doc.setFontSize(11); doc.setFont(undefined,'bold');
    doc.text('Question Review', 14, y); y += 6;
    doc.setFontSize(8); doc.setFont(undefined,'normal');
    (r.questions || []).forEach(function(q, i) {
      var ans = (r.answers || {})[i];
      var right = ans === q.correct;
      var mark = right ? '✓' : '✗';
      var col = right ? [46,139,87] : [214,40,40];
      doc.setTextColor(col[0],col[1],col[2]);
      var qText = (i+1) + '. ' + mark + ' ' + (q.question||'').slice(0,90) + (q.question && q.question.length>90?'…':'');
      doc.text(qText, 14, y); y += 4;
      doc.setTextColor(100,100,100);
      doc.text('   Your: ' + (ans||'—') + '  Correct: ' + (q.correct||'?'), 14, y); y += 5;
      if (y > 270) { doc.addPage(); y = 18; }
      doc.setTextColor(0,0,0);
    });
    // Footer
    var pageCount = doc.internal.getNumberOfPages();
    for (var pi = 1; pi <= pageCount; pi++) {
      doc.setPage(pi);
      doc.setFontSize(8); doc.setTextColor(150,150,150);
      doc.text('PMP Exam Accelerator · ' + (t.name||'') + ' · Page ' + pi + ' of ' + pageCount, 105, 290, {align:'center'});
    }
    doc.save('PMP-Results-' + new Date().toISOString().slice(0,10) + '.pdf');
  } catch(e) {
    alert('PDF export failed: ' + e.message + '\nTry the Print button instead.');
  }
}
