<style>
* { box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; margin: 0; }

/* Layout */
#sidebar { width: 260px; transition: transform .25s; }
@media(max-width:768px) { #sidebar { position:fixed; z-index:50; transform:translateX(-100%); } #sidebar.open { transform:translateX(0); } }
#main { margin-left: 260px; }
@media(max-width:768px) { #main { margin-left: 0; } }

/* Scrollbar */
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#CBD5E0; border-radius:2px; }
.dark ::-webkit-scrollbar-thumb { background:#374151; }

/* Animations */
.fade-in { animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* Cards */
.card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.dark .card { background:#1e2d3d; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:.4rem; padding:.55rem 1.2rem; border-radius:8px; font-weight:600; font-size:.875rem; border:none; cursor:pointer; transition:opacity .15s,transform .1s; }
.btn:active { transform:scale(.97); }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn-primary { background:#0A2342; color:#fff; }
.btn-primary:hover:not(:disabled) { background:#12355B; }
.btn-success { background:#2E8B57; color:#fff; }
.btn-success:hover:not(:disabled) { background:#256b43; }
.btn-danger { background:#D62828; color:#fff; }
.btn-danger:hover:not(:disabled) { background:#b52020; }
.btn-ghost { background:#F7F9FC; color:#0A2342; border:1px solid #E5EAF0; }
.btn-ghost:hover:not(:disabled) { background:#E5EAF0; }
.dark .btn-ghost { background:#243347; color:#e2e8f0; border-color:#2d4060; }
.dark .btn-ghost:hover:not(:disabled) { background:#2d4060; }

/* Inputs */
.inp { width:100%; padding:.55rem .85rem; border:1.5px solid #E5EAF0; border-radius:8px; font-size:.875rem; outline:none; background:#fff; color:#0A2342; transition:border .2s; font-family:inherit; }
.inp:focus { border-color:#0A2342; }
.dark .inp { background:#243347; border-color:#2d4060; color:#e2e8f0; }
.dark .inp:focus { border-color:#5b8dd9; }
.lbl { display:block; font-size:.75rem; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.04em; margin-bottom:.3rem; }
.dark .lbl { color:#7fa3c8; }

/* Nav */
.nav-link { display:flex; align-items:center; gap:.75rem; padding:.6rem .75rem; border-radius:8px; color:rgba(255,255,255,.65); font-size:.875rem; font-weight:500; cursor:pointer; border:none; background:none; width:100%; transition:background .15s; }
.nav-link:hover { background:rgba(255,255,255,.1); color:#fff; }
.nav-link.active { background:rgba(255,255,255,.15); color:#fff; }

/* Progress */
.progress { height:6px; border-radius:3px; background:#E5EAF0; overflow:hidden; }
.dark .progress { background:#2d4060; }
.progress-fill { height:100%; border-radius:3px; transition:width .4s; }

/* Option buttons */
.opt { width:100%; text-align:left; padding:.8rem 1rem; border-radius:10px; border:1.5px solid #E5EAF0; background:#fff; color:#0A2342; cursor:pointer; font-size:.9rem; display:flex; align-items:flex-start; gap:.75rem; transition:border .15s,background .15s; font-family:inherit; }
.opt:hover:not(:disabled) { border-color:#0A2342; background:#F7F9FC; }
.opt.sel { border-color:#0A2342; background:#EEF3FA; }
.opt.ok { border-color:#2E8B57 !important; background:#f0fdf4; }
.opt.bad { border-color:#D62828 !important; background:#fff5f5; }
.dark .opt { background:#1e2d3d; border-color:#2d4060; color:#e2e8f0; }
.dark .opt:hover:not(:disabled) { border-color:#5b8dd9; background:#243347; }
.dark .opt.sel { border-color:#5b8dd9; background:#1c3461; }
.dark .opt.ok { border-color:#2E8B57 !important; background:#0d2e1a; }
.dark .opt.bad { border-color:#D62828 !important; background:#2e0d0d; }
.opt-key { width:28px; min-width:28px; height:28px; border-radius:50%; background:#E5EAF0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.8rem; color:#0A2342; flex-shrink:0; }
.opt.sel .opt-key { background:#0A2342; color:#fff; }
.opt.ok .opt-key { background:#2E8B57; color:#fff; }
.opt.bad .opt-key { background:#D62828; color:#fff; }
.dark .opt-key { background:#2d4060; color:#e2e8f0; }

/* Badge */
.badge { display:inline-flex; padding:.15rem .6rem; border-radius:999px; font-size:.7rem; font-weight:700; letter-spacing:.03em; }
.badge-blue { background:#dbeafe; color:#1d4ed8; } .dark .badge-blue { background:#1e3a5f; color:#93c5fd; }
.badge-green { background:#dcfce7; color:#15803d; } .dark .badge-green { background:#0d2e1a; color:#86efac; }
.badge-orange { background:#ffedd5; color:#c2410c; } .dark .badge-orange { background:#2e1a0d; color:#fdba74; }
.badge-red { background:#fee2e2; color:#b91c1c; } .dark .badge-red { background:#2e0d0d; color:#fca5a5; }

/* Table */
.tbl { width:100%; border-collapse:collapse; font-size:.875rem; }
.tbl th { text-align:left; padding:.6rem 1rem; background:#F7F9FC; color:#64748b; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid #E5EAF0; }
.tbl td { padding:.7rem 1rem; border-bottom:1px solid #F7F9FC; vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tr:hover td { background:#F7F9FC; }
.dark .tbl th { background:#243347; color:#7fa3c8; border-color:#2d4060; }
.dark .tbl td { border-color:#1e2d3d; }
.dark .tbl tr:hover td { background:#243347; }

/* Upload zone */
.drop-zone { border:2px dashed #E5EAF0; border-radius:10px; padding:2rem; text-align:center; cursor:pointer; transition:border .2s,background .2s; }
.drop-zone:hover { border-color:#0A2342; background:#F7F9FC; }
.dark .drop-zone { border-color:#2d4060; }
.dark .drop-zone:hover { border-color:#5b8dd9; background:#243347; }

/* Modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; }
.modal-box { background:#fff; border-radius:14px; padding:1.75rem; max-width:520px; width:100%; max-height:90vh; overflow-y:auto; }
.dark .modal-box { background:#1e2d3d; }

/* Collapsible */
.collapsible { overflow:hidden; max-height:0; transition:max-height .3s ease; }
.collapsible.open { max-height:1200px; }

/* Gradients for stat cards */
.grad-navy { background:linear-gradient(135deg,#0A2342,#1a4a7a); }
.grad-green { background:linear-gradient(135deg,#2E8B57,#3aab6d); }
.grad-orange { background:linear-gradient(135deg,#F4A261,#f7bc8c); }
.grad-red { background:linear-gradient(135deg,#D62828,#e04a4a); }

/* Mode cards */
.mode-card { border:2px solid #E5EAF0; border-radius:12px; padding:1.25rem; cursor:pointer; transition:border .15s,background .15s; background:#fff; }
.mode-card:hover { border-color:#0A2342; }
.mode-card.active { border-color:#0A2342; background:#EEF3FA; }
.dark .mode-card { background:#1e2d3d; border-color:#2d4060; }
.dark .mode-card:hover { border-color:#5b8dd9; }
.dark .mode-card.active { border-color:#5b8dd9; background:#1c3461; }

/* Timer */
.timer-warn { color:#D62828 !important; }

/* Sidebar overlay */
#sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:49; }
#sidebar-overlay.show { display:block; }

@media print { #sidebar, #topbar, .no-print { display:none !important; } #main { margin-left:0 !important; } }

/* Trainer contact bar — student mode only */
#trainer-bar {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 1000;
  background: linear-gradient(135deg, #0A2342 0%, #12355B 100%);
  border-top: 3px solid #F4A261;
  box-shadow: 0 -4px 24px rgba(10,35,66,.35);
  padding: .65rem 1.25rem;
}
#trainer-bar.visible { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
#trainer-bar .tb-photo {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.15); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 1.1rem;
  flex-shrink: 0; border: 2px solid rgba(255,255,255,.3);
}
#trainer-bar .tb-info { flex: 1; min-width: 0; }
#trainer-bar .tb-name { color: #fff; font-weight: 800; font-size: .95rem; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#trainer-bar .tb-creds { color: rgba(255,255,255,.55); font-size: .72rem; margin-top: .1rem; }
#trainer-bar .tb-label { color: rgba(255,255,255,.35); font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
#trainer-bar .tb-btns { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
#trainer-bar .tb-btn {
  display: inline-flex; align-items: center; gap: .35rem;
  padding: .45rem 1rem; border-radius: 8px;
  font-size: .8rem; font-weight: 700;
  text-decoration: none; white-space: nowrap;
  transition: opacity .15s, transform .1s;
  border: none; cursor: pointer;
}
#trainer-bar .tb-btn:hover { opacity: .88; transform: translateY(-1px); }
#trainer-bar .tb-btn:active { transform: translateY(0); }
.tb-wa   { background: #25D366; color: #fff !important; }
.tb-call { background: rgba(255,255,255,.15); color: #fff !important; border: 1.5px solid rgba(255,255,255,.25) !important; }
.tb-mail { background: rgba(255,255,255,.12); color: #fff !important; border: 1.5px solid rgba(255,255,255,.2) !important; }
.tb-web  { background: rgba(255,255,255,.1);  color: #fff !important; border: 1.5px solid rgba(255,255,255,.2) !important; }
.tb-li   { background: #0077b5; color: #fff !important; }
#trainer-bar .tb-close {
  background: none; border: none; color: rgba(255,255,255,.35);
  cursor: pointer; font-size: 1.1rem; line-height: 1;
  flex-shrink: 0; padding: .2rem; transition: color .15s;
}
#trainer-bar .tb-close:hover { color: rgba(255,255,255,.8); }

/* Push main content above the bar when bar is visible */
body.has-trainer-bar #main { padding-bottom: 80px; }
@media (max-width: 640px) { body.has-trainer-bar #main { padding-bottom: 130px; } }
</style>

<script>

// ─────────────────────────────────────────────
//  GLOBALS & STATE
// ─────────────────────────────────────────────
const STORE_KEY = 'pmp_v3';

// ─── Built-in Question Bank (pre-loaded, no upload needed) ───
var BUILTIN_BANK = {"id":"builtin-ethics-001","name":"PMP Ethics Bank — 50Q (Built-in)","active":true,"date":"2026-06-06T09:56:53.699Z","questions":[{"id":"e0","question":"A project manager discovers that a team member has been falsifying test results to meet a deadline. The team member argues the product is 'good enough' and fixing it would delay the project significantly. What should the project manager do FIRST?","optionA":"Accept the team member's judgment since they are the technical expert.","optionB":"Investigate the situation, halt affected work, and report through proper channels.","optionC":"Quietly fix the issue without reporting it to avoid damaging the project timeline.","optionD":"Wait until the project is complete, then address the issue during lessons learned.","correct":"B","explanation":"PMI's Code of Ethics demands honesty and transparency. Falsified test results are a direct ethics violation regardless of technical justification. The PM must investigate immediately, stop any work based on false data, and report per organisational policy. Option A ignores the ethical dimension. Option C makes the PM complicit. Option D is unacceptable — ethics violations are never deferred. PMI Principle: Ethics: Honesty & Transparency","domain":"Ethics: Honesty & Transparency","difficulty":"Medium"},{"id":"e1","question":"The project sponsor asks the project manager to submit a status report showing the project as 'Green' even though it is significantly behind schedule and over budget. The sponsor wants to avoid concern from senior leadership until a recovery plan is in place. What should the project manager do?","optionA":"Submit the green report as requested — the sponsor has higher authority.","optionB":"Delay submitting any report until the recovery plan is ready.","optionC":"Submit an accurate report reflecting the true status, with a note that a recovery plan is being developed.","optionD":"Submit the green report but verbally inform senior leadership of the real status.","correct":"C","explanation":"Accurate and transparent reporting is a PMI ethical obligation. The PM cannot report false status regardless of who requests it — even the sponsor. Option C is correct: report truthfully AND proactively include the recovery plan context. Option A follows authority over ethics — wrong. Option B delays transparency — wrong. Option D is contradictory and also unethical. PMI Principle: Ethics: Transparency in Reporting","domain":"Ethics: Transparency in Reporting","difficulty":"Medium"},{"id":"e2","question":"A project manager is approached by a vendor who is bidding on the project. The vendor offers the PM tickets to an expensive sporting event as a 'gesture of goodwill.' What should the PM do?","optionA":"Accept the tickets since they are a social gesture and do not influence decisions.","optionB":"Accept the tickets but recuse themselves from vendor selection decisions.","optionC":"Decline the offer and report it per the organisation's conflict of interest policy.","optionD":"Accept the tickets and ensure the vendor is not selected to avoid any appearance of bias.","correct":"C","explanation":"Accepting gifts from vendors in an active bidding process is a conflict of interest — a direct violation of PMI's Code of Ethics (Fairness). The correct action is to decline AND report the offer. Option A rationalises acceptance — wrong. Option B is insufficient — the offer itself must still be declined and reported. Option D is self-contradictory and still involves accepting the gift. PMI Principle: Ethics: Fairness & Conflict of Interest","domain":"Ethics: Fairness & Conflict of Interest","difficulty":"Medium"},{"id":"e3","question":"Midway through a project, the project manager realises the project no longer aligns with the organisation's strategic objectives due to a market shift. The sponsor insists on continuing. What should the PM do?","optionA":"Continue the project — the sponsor has the authority to make this decision.","optionB":"Immediately terminate the project without consulting the sponsor.","optionC":"Present the strategic misalignment objectively to the sponsor and recommend a formal review.","optionD":"Escalate directly to the board of directors, bypassing the sponsor.","correct":"C","explanation":"PMI expects PMs to be honest advisors, not just executors. When a project loses strategic value, the PM has a professional obligation to surface this objectively. Option C is correct: present the facts, recommend review, and let the proper governance process decide. Option A is passive compliance without professional judgment. Option B is unilateral — wrong. Option D bypasses the sponsor inappropriately. PMI Principle: Ethics: Responsibility & Professional Judgment","domain":"Ethics: Responsibility & Professional Judgment","difficulty":"Medium"},{"id":"e4","question":"A project manager discovers that their organisation submitted a proposal with incorrect cost data, which won the contract. The error appears accidental but would significantly change the project economics if corrected. What should the PM do?","optionA":"Proceed with the project — the contract is signed and the error was unintentional.","optionB":"Disclose the error to management and the client immediately and recommend a corrective approach.","optionC":"Quietly adjust costs in the project plan to absorb the discrepancy without disclosure.","optionD":"Wait to see if the client notices the discrepancy during execution.","correct":"B","explanation":"PMI Code of Ethics: Honesty requires that known errors be disclosed regardless of whether they were intentional. The PM must immediately escalate to management and disclose to the client. Option A ignores the ethical obligation. Option C is deceptive and likely a contract violation. Option D is passive dishonesty — hoping the error goes unnoticed is not acceptable. PMI Principle: Ethics: Honesty & Responsibility","domain":"Ethics: Honesty & Responsibility","difficulty":"Medium"},{"id":"e5","question":"A team member confides in the project manager that they are struggling with a personal issue that is affecting their work performance. The team member asks the PM to keep this confidential. What should the PM do?","optionA":"Share the information with HR immediately to ensure the project is not impacted.","optionB":"Respect the confidence, support the team member, and work together on adjustments, involving HR only if the situation requires formal support.","optionC":"Document the conversation formally and submit it to the team member's functional manager.","optionD":"Ignore the performance issue to respect the confidentiality request completely.","correct":"B","explanation":"The PM should respect the confidence while also addressing the performance impact. PMI values both respect and responsibility. Working with the team member on adjustments is the immediate correct step — involving HR only if formal support is genuinely needed. Option A immediately escalates without the team member's knowledge — disrespectful. Option C is a documentation overreach. Option D ignores the performance obligation. PMI Principle: Mindset: Respect & Servant Leadership","domain":"Mindset: Respect & Servant Leadership","difficulty":"Medium"},{"id":"e6","question":"During project execution, a team member raises a concern that the project's deliverable could have unintended negative consequences for end users that were not considered in the planning phase. What should the PM do?","optionA":"Dismiss the concern — the scope was approved and does not include social impact analysis.","optionB":"Evaluate the concern seriously, document it, and raise it with the sponsor and relevant stakeholders.","optionC":"Ask the team member to raise the concern in the next retrospective.","optionD":"Tell the team member to focus on delivery and not on matters outside the project scope.","correct":"B","explanation":"PMI's Code of Ethics includes responsibility to society and the public, not just project stakeholders. When a potential harm to end users is identified, the PM must take it seriously and surface it to decision-makers. Option A and D dismiss a legitimate risk. Option C delays what should be immediate attention. PMI Principle: Ethics: Responsibility to Society","domain":"Ethics: Responsibility to Society","difficulty":"Medium"},{"id":"e7","question":"A project manager is offered a lucrative consulting contract by a competitor of their current employer, to start after their current project ends. The competing company has asked for detailed information about current project strategies as part of the interview. What should the PM do?","optionA":"Share only publicly available information during the interview.","optionB":"Decline to share confidential project information regardless of the opportunity.","optionC":"Share the information since the competing contract will start after the current project ends.","optionD":"Inform HR about the job opportunity and then share the information.","correct":"B","explanation":"Sharing confidential project information with a competitor is a breach of ethics, confidentiality, and potentially law — regardless of when the new contract starts. The PM must decline absolutely. Option A still risks disclosing confidential information framed as 'public.' Option C uses timing to rationalise a violation. Option D does not make sharing the information acceptable. PMI Principle: Ethics: Honesty & Confidentiality","domain":"Ethics: Honesty & Confidentiality","difficulty":"Medium"},{"id":"e8","question":"A project manager is told by their manager to approve a change without formal change control to 'save time.' The manager argues the change is minor and the CCB process is bureaucratic. What should the PM do?","optionA":"Follow the manager's instruction — they have authority over the PM.","optionB":"Implement the change informally but document it retroactively.","optionC":"Decline respectfully, explain the risks of bypassing change control, and submit the change through the CCB.","optionD":"Implement the change without documentation to avoid conflict.","correct":"C","explanation":"PMI's process compliance principle is non-negotiable. No one — including management — has authority to bypass Integrated Change Control. The PM must decline, explain risks, and follow the process. Option A follows authority over process. Option B is retroactive documentation which still bypasses CCB. Option D compounds the error with no documentation. PMI Principle: Mindset: Process Compliance","domain":"Mindset: Process Compliance","difficulty":"Medium"},{"id":"e9","question":"A team member approaches the project manager claiming a senior team member is taking credit for their work in presentations to leadership. What should the PM do?","optionA":"Tell the junior team member to document their contributions and raise it themselves.","optionB":"Investigate the claim, address it privately with the senior team member, and ensure correct attribution going forward.","optionC":"Ignore the issue — internal team dynamics are not part of the PM's responsibilities.","optionD":"Immediately report the senior team member to HR without discussing it with them first.","correct":"B","explanation":"PMI Code of Ethics: Fairness and Honesty require that credit be accurately attributed. The PM must investigate, address the root cause directly and privately, and correct the attribution. Option A deflects PM responsibility. Option C ignores an ethics obligation. Option D escalates without giving the senior team member a chance to respond — bypassing the direct resolution step. PMI Principle: Ethics: Fairness & Honesty","domain":"Ethics: Fairness & Honesty","difficulty":"Medium"},{"id":"e10","question":"A project manager learns that a team member has accepted a part-time consulting role with a supplier that is currently working on the project. The team member did not disclose this. What should the PM do?","optionA":"Allow it — the team member's personal finances are not the PM's concern.","optionB":"Ask the team member to disclose the conflict of interest per policy and remove themselves from decisions involving that supplier.","optionC":"Immediately terminate the team member's contract.","optionD":"Warn the team member privately but take no formal action.","correct":"B","explanation":"This is a conflict of interest situation. PMI's Code of Ethics requires disclosure and management of conflicts. The PM must ensure the team member formally discloses the conflict per policy and recuses themselves from related decisions. Option A ignores a clear ethics violation. Option C is disproportionate without due process. Option D is informal and insufficient. PMI Principle: Ethics: Fairness & Conflict of Interest","domain":"Ethics: Fairness & Conflict of Interest","difficulty":"Medium"},{"id":"e11","question":"The project is behind schedule. A team member suggests falsifying progress data 'just for this reporting cycle' to avoid pressure from leadership while a recovery plan is developed. What should the PM do?","optionA":"Agree temporarily — it is better to buy time than face immediate shutdown.","optionB":"Agree but plan to disclose the issue next reporting cycle.","optionC":"Reject the idea firmly, report accurate status, and present a recovery plan alongside.","optionD":"Ask the team member to submit the false data directly so the PM has plausible deniability.","correct":"C","explanation":"Falsifying project data is a direct ethics violation regardless of intent. The PM must report accurate status AND proactively present the recovery plan — turning a negative situation into a constructive one. All other options involve participating in or enabling deception. PMI Principle: Ethics: Honesty in Reporting","domain":"Ethics: Honesty in Reporting","difficulty":"Medium"},{"id":"e12","question":"A project manager's organisation has a policy against accepting gifts over $25 in value from vendors. A vendor sends the project manager a gift basket valued at $150 with a 'thank you' card. What should the PM do?","optionA":"Keep the gift — it was sent, not requested.","optionB":"Share the gift with the team so no individual benefits unfairly.","optionC":"Return the gift, inform the vendor of the policy, and document the incident.","optionD":"Accept the gift but disclose it to HR.","correct":"C","explanation":"Organisational gift policies exist to protect against conflicts of interest. When a gift violates the policy, the PM must return it, communicate the policy to the vendor, and document the incident. Options A and B retain the gift — still a policy violation. Option D accepts the gift first, which still violates the policy even with disclosure. PMI Principle: Ethics: Fairness & Organisational Policy","domain":"Ethics: Fairness & Organisational Policy","difficulty":"Medium"},{"id":"e13","question":"A project manager is aware that the project's requirements were developed based on outdated regulations. Updating the requirements would delay the project by 4 weeks. The sponsor wants to proceed with the original schedule. What should the PM do?","optionA":"Proceed as planned — the sponsor has decision authority.","optionB":"Quietly update the requirements without telling the sponsor to avoid conflict.","optionC":"Formally present the regulatory risk to the sponsor with impact options and allow an informed decision.","optionD":"Proceed but document that the PM warned the sponsor verbally.","correct":"C","explanation":"The PM has a professional responsibility to surface regulatory risks accurately. A formal presentation with impact options allows the sponsor to make an informed decision — this protects both the organisation and the PM. Option A is passive compliance that ignores the PM's advisory responsibility. Option B is unauthorised scope change. Option D is insufficient — verbal warnings without formal documentation offer no real protection. PMI Principle: Ethics: Responsibility & Transparency","domain":"Ethics: Responsibility & Transparency","difficulty":"Medium"},{"id":"e14","question":"A senior stakeholder privately tells the project manager that they will block the project's approval if a particular vendor is not selected — a vendor in which the stakeholder has a financial interest. What should the PM do?","optionA":"Select the vendor to ensure the project proceeds.","optionB":"Refuse the request and document the conversation. Report the conflict of interest per organisational policy.","optionC":"Find a way to justify the vendor selection on technical grounds.","optionD":"Escalate to the project sponsor without documenting the conversation.","correct":"B","explanation":"This is a clear conflict of interest and potentially illegal. The PM must refuse, document the conversation, and report through proper channels. Options A and C facilitate the ethics violation. Option D escalates correctly but without documentation — documentation is essential in ethics situations. PMI Principle: Ethics: Fairness, Honesty & Accountability","domain":"Ethics: Fairness, Honesty & Accountability","difficulty":"Medium"},{"id":"e15","question":"A project manager discovers a way to complete the project 3 weeks early by taking a technical shortcut that is not in the project plan. The shortcut carries some additional risk. What should the PM do?","optionA":"Implement the shortcut — finishing early benefits everyone.","optionB":"Implement the shortcut and mention it in the next status report.","optionC":"Evaluate the shortcut formally, submit a change request, and get CCB approval before implementing.","optionD":"Ask a team member to implement it quietly to avoid the change control overhead.","correct":"C","explanation":"Even beneficial changes must go through Integrated Change Control. The PM cannot unilaterally change the project plan without approval regardless of the benefit. Options A, B, and D all bypass the required change control process. Option C is the only correct approach — evaluate formally, submit change request, obtain approval. PMI Principle: Mindset: Process Compliance","domain":"Mindset: Process Compliance","difficulty":"Medium"},{"id":"e16","question":"A project manager receives pressure from their manager to certify that a deliverable meets quality standards when it has not yet been fully tested. The manager argues that testing can happen 'in production.' What should the PM do?","optionA":"Sign off as requested — the manager has authority.","optionB":"Refuse to certify until proper testing is complete, explain the risks clearly.","optionC":"Certify conditionally with a note that testing is pending.","optionD":"Ask a team member to sign the certification instead.","correct":"B","explanation":"Falsely certifying a deliverable is an ethics violation and exposes the organisation to significant quality and liability risk. The PM must refuse and clearly explain the consequences of skipping proper testing. Option A follows authority over ethics. Option C is still a false certification. Option D transfers the ethical violation to another person. PMI Principle: Ethics: Responsibility & Quality Integrity","domain":"Ethics: Responsibility & Quality Integrity","difficulty":"Medium"},{"id":"e17","question":"During a project kickoff meeting, a team member publicly challenges the project manager's technical decisions in a disrespectful manner. What should the PM do?","optionA":"Respond forcefully in the meeting to assert authority.","optionB":"Address the technical concerns in the meeting, then speak to the team member privately about the manner of the challenge.","optionC":"Ignore the behaviour to avoid escalating the situation publicly.","optionD":"Remove the team member from the meeting immediately.","correct":"B","explanation":"PMI's servant leadership model requires the PM to address both the substance (technical concern) and the behaviour (disrespect) — separately and appropriately. The meeting is the place to address the technical point. The private conversation is for addressing professional conduct. Option A creates public conflict. Option C allows disrespectful behaviour to continue. Option D is disproportionate. PMI Principle: Mindset: Servant Leadership & Respect","domain":"Mindset: Servant Leadership & Respect","difficulty":"Medium"},{"id":"e18","question":"A project manager is working in a country where facilitation payments to officials are common practice to speed up permitting processes. The project is at risk of significant delay without such a payment. What should the PM do?","optionA":"Make the payment — local customs must be respected.","optionB":"Ask a local team member to make the payment to distance the PM from the action.","optionC":"Refuse the payment, escalate to management and legal, and seek alternative solutions.","optionD":"Make the payment but document it as a 'consulting fee.'","correct":"C","explanation":"PMI's Code of Ethics explicitly prohibits bribery and corruption regardless of local customs or project pressure. The PM must refuse and escalate. Options A, B, and D all involve facilitating bribery — the motive does not change the nature of the action. Option B makes a team member complicit. Option D disguises bribery as a legitimate cost. PMI Principle: Ethics: Honesty, Responsibility & Anti-Corruption","domain":"Ethics: Honesty, Responsibility & Anti-Corruption","difficulty":"Medium"},{"id":"e19","question":"A project manager overhears two team members discussing confidential project financials in a public coffee shop. What should the PM do?","optionA":"Report both team members to HR immediately.","optionB":"Pretend not to notice — it was accidental and no damage was done.","optionC":"Speak privately to both team members, remind them of confidentiality obligations, and document the coaching.","optionD":"Send a team-wide email about information security policies.","correct":"C","explanation":"This is a confidentiality breach. The PM must address it directly with the individuals involved, reinforce obligations, and document the coaching. Option A is disproportionate for what may be an inadvertent breach. Option B ignores a real risk. Option D addresses the team broadly but does not directly handle the specific incident. PMI Principle: Ethics: Confidentiality & Responsibility","domain":"Ethics: Confidentiality & Responsibility","difficulty":"Medium"},{"id":"e20","question":"A project manager is asked to lead a project in a technical domain they have no experience in. They are not sure they have the competence to manage it effectively. What should the PMI-aligned PM do?","optionA":"Accept the assignment confidently and learn on the job.","optionB":"Decline the assignment entirely.","optionC":"Accept the assignment, proactively disclose the knowledge gap, and develop a plan to bridge it (e.g., subject matter experts, training).","optionD":"Accept and hide the knowledge gap to avoid appearing weak.","correct":"C","explanation":"PMI Code of Ethics: Responsibility requires PMs to be honest about their capabilities while also developing them. Accepting the role with transparency and a development plan is the correct approach. Option A accepts without acknowledging the gap — risky. Option B is overly conservative — PMs can and do manage domains outside their expertise with proper support. Option D is dishonest. PMI Principle: Ethics: Responsibility & Competency Development","domain":"Ethics: Responsibility & Competency Development","difficulty":"Medium"},{"id":"e21","question":"A project manager is managing a project with a team member who has a disability that requires workplace accommodation. The accommodation request has been pending with HR for 3 weeks. What should the PM do?","optionA":"Tell the team member to follow up with HR — it is HR's responsibility.","optionB":"Proactively advocate with HR to expedite the accommodation, and adjust workload temporarily if feasible.","optionC":"Assign the team member to lower-priority tasks until the accommodation is resolved.","optionD":"Document that the delay is HR's fault to protect the PM from accountability.","correct":"B","explanation":"PMI servant leadership: the PM advocates for team members' wellbeing and removes impediments. A 3-week delay on a workplace accommodation is an impediment the PM should help resolve by engaging HR. Option A deflects responsibility. Option C reassigns work based on the disability — potentially discriminatory. Option D is defensive rather than proactive. PMI Principle: Mindset: Servant Leadership & Respect","domain":"Mindset: Servant Leadership & Respect","difficulty":"Medium"},{"id":"e22","question":"A project team member admits to the project manager that they padded their estimates by 20% 'just to be safe.' The project budget was approved based on these padded estimates. What should the PM do?","optionA":"Leave it — padding is common practice and protects the project.","optionB":"Re-evaluate the estimates honestly, adjust the budget if needed, and update the project plan.","optionC":"Ask the team member to keep this between them to avoid reopening budget discussions.","optionD":"Report the team member to management for dishonest estimating.","correct":"B","explanation":"PMI requires accurate, honest estimates. Padding — while common — misrepresents the true cost basis. The PM should re-evaluate and correct the estimates. Option A normalises dishonest estimating. Option C makes the PM complicit. Option D is disproportionate — the issue should be addressed as a process correction, not a disciplinary matter at this stage. PMI Principle: Ethics: Honesty & Accurate Estimating","domain":"Ethics: Honesty & Accurate Estimating","difficulty":"Medium"},{"id":"e23","question":"A project manager learns that a competitor has somehow obtained confidential details of their project proposal. There is suspicion that an internal team member leaked the information. What should the PM do?","optionA":"Confront the suspected team member directly.","optionB":"Report the security breach to management and the appropriate security/legal team, and cooperate fully with the investigation.","optionC":"Ignore it — the damage is done and investigating will distract the team.","optionD":"Inform the client of the breach but handle the investigation internally without involving security.","correct":"B","explanation":"A confidential information breach is a serious security and ethics matter. The PM must report it through proper channels (management, security, legal) and cooperate with the investigation. Direct confrontation (Option A) is not the PM's role. Option C is irresponsible — the breach must be addressed. Option D partially addresses it but bypasses the internal security process. PMI Principle: Ethics: Responsibility & Confidentiality","domain":"Ethics: Responsibility & Confidentiality","difficulty":"Medium"},{"id":"e24","question":"A project manager is asked to sign a document certifying that a vendor's deliverable meets all contract requirements. The PM has not personally reviewed the deliverable and is relying on a team member's verbal assurance. What should the PM do?","optionA":"Sign the document — the team member is experienced and trustworthy.","optionB":"Refuse to sign until personally reviewing or formally verifying the deliverable.","optionC":"Sign with a disclaimer noting it was based on team member assurance.","optionD":"Ask the team member to sign the document instead.","correct":"B","explanation":"Certifying a deliverable you have not reviewed is a professional integrity risk. The PM must verify before signing or ensure a formal documented verification process was followed. Option A relies on unverified assurance. Option C signing with a disclaimer still certifies without proper verification. Option D passes the responsibility to someone with less accountability. PMI Principle: Ethics: Responsibility & Accuracy","domain":"Ethics: Responsibility & Accuracy","difficulty":"Medium"},{"id":"e25","question":"A project manager is notified that a critical project risk has materialised, causing significant cost overrun. The PM forgot to monitor this risk after identifying it early in the project. What should the PM do?","optionA":"Blame the risk owner for failing to monitor the risk.","optionB":"Accept responsibility, communicate the impact to the sponsor immediately, and develop a recovery plan.","optionC":"Attribute the issue to unforeseeable circumstances to protect the team.","optionD":"Update the risk register retrospectively to show the risk was being monitored.","correct":"B","explanation":"The PM owns project outcomes — including failures. PMI's accountability principle requires the PM to accept responsibility, communicate transparently, and address the issue. Option A deflects blame. Option C misrepresents what happened. Option D is dishonest retroactive documentation. PMI Principle: Mindset: Accountability & Proactive Communication","domain":"Mindset: Accountability & Proactive Communication","difficulty":"Medium"},{"id":"e26","question":"A team member asks the project manager for a reference letter for a new job application. The PM has mixed views — the team member is technically strong but has had interpersonal issues on the project. What should the PM do?","optionA":"Write a fully positive reference to support the team member.","optionB":"Decline to write the reference entirely.","optionC":"Write an honest reference that reflects both the technical strengths and the areas for development.","optionD":"Ask a senior team member to write the reference instead.","correct":"C","explanation":"PMI Code of Ethics: Honesty. A reference letter must be truthful. An inflated reference misrepresents the candidate to the next employer — an ethics violation. An honest, balanced reference serves both parties fairly. Option A is dishonestly positive. Option B avoids the issue. Option D passes responsibility without resolving the ethical question. PMI Principle: Ethics: Honesty in Professional Representations","domain":"Ethics: Honesty in Professional Representations","difficulty":"Medium"},{"id":"e27","question":"The project is approaching a key milestone review. A team member suggests presenting a slightly optimistic view of the schedule 'to build stakeholder confidence.' What should the PM do?","optionA":"Agree — stakeholder confidence is important for project success.","optionB":"Reject the suggestion and present an accurate status with a plan for any shortfalls.","optionC":"Present the optimistic view but privately brief key stakeholders on the real status.","optionD":"Ask the sponsor to present the milestone update to create distance from the data.","correct":"B","explanation":"Misrepresenting status — even slightly — violates PMI's ethics. Stakeholders need accurate information to make decisions. Presenting honest status with a credible recovery plan builds more lasting confidence than false optimism. Options A and C involve misrepresentation. Option D deflects responsibility. PMI Principle: Ethics: Transparency & Accurate Reporting","domain":"Ethics: Transparency & Accurate Reporting","difficulty":"Medium"},{"id":"e28","question":"A project manager receives two job offers: one from their current employer (a new internal project) and one from a direct competitor at significantly higher pay. While still employed, they need to decide. What is the PMI-aligned approach?","optionA":"Accept the competitor offer immediately and resign — personal advancement is the PM's right.","optionB":"Decline both offers and stay in the current role.","optionC":"Make the decision professionally and ethically — respect current employer obligations during transition, do not take confidential information, and honour notice periods.","optionD":"Accept the competitor offer but continue working the current project long enough to extract all useful information.","correct":"C","explanation":"PMI Code of Ethics: Responsibility and Honesty apply to career transitions too. PMs can pursue career advancement but must honour their obligations to their current employer — notice periods, confidentiality, and not using their position to benefit a competitor. Option A may violate confidentiality obligations. Option D is clearly unethical. PMI Principle: Ethics: Responsibility in Career Transitions","domain":"Ethics: Responsibility in Career Transitions","difficulty":"Medium"},{"id":"e29","question":"A project manager discovers that the project's environmental impact assessment was skipped to meet a deadline, even though it was a regulatory requirement. What should the PM do?","optionA":"Continue the project and conduct the assessment later when time permits.","optionB":"Halt the relevant work, notify the sponsor and legal/compliance team, and arrange for the assessment immediately.","optionC":"Complete the project and conduct the assessment as part of a post-project review.","optionD":"Document that skipping was a business decision made by the sponsor.","correct":"B","explanation":"Regulatory compliance is non-negotiable. Skipping a required environmental assessment exposes the organisation to legal liability. The PM must stop the relevant work and arrange compliance immediately — not after the fact. Options A and C defer compliance. Option D is defensive documentation rather than corrective action. PMI Principle: Ethics: Responsibility to Regulations & Society","domain":"Ethics: Responsibility to Regulations & Society","difficulty":"Medium"},{"id":"e30","question":"During project execution, a team member makes a significant mistake that delays the project by one week. The team member is visibly distressed. What is the PMI-aligned response from the project manager?","optionA":"Document the mistake formally and issue a written warning.","optionB":"Acknowledge the impact, support the team member, focus on corrective action and process improvement to prevent recurrence.","optionC":"Reassign the team member to less critical work for the rest of the project.","optionD":"Inform the team member's functional manager immediately.","correct":"B","explanation":"PMI's servant leadership model: mistakes are opportunities for learning and process improvement, not punishment. The PM should acknowledge the impact, support the team member, and address the root cause to prevent recurrence. Option A is a punitive response to what may be a system failure. Option C penalises without due process. Option D escalates prematurely. PMI Principle: Mindset: Servant Leadership & Psychological Safety","domain":"Mindset: Servant Leadership & Psychological Safety","difficulty":"Medium"},{"id":"e31","question":"A project manager is pressured by the client to add features that are not in the agreed scope without submitting a formal change request. The client argues the features are 'small additions.' What should the PM do?","optionA":"Add the features — client satisfaction is the PM's top priority.","optionB":"Add the features but track them privately in case they affect the schedule.","optionC":"Decline to add any features without a formal change request and CCB approval.","optionD":"Add the features now and retroactively raise a change request.","correct":"C","explanation":"All scope additions — regardless of size — require formal change control. This protects the PM, the team, and the client's expectations. Options A and B add scope without formal approval. Option D is retroactive change control which still bypasses the proper process. PMI Principle: Mindset: Process Compliance & Scope Control","domain":"Mindset: Process Compliance & Scope Control","difficulty":"Medium"},{"id":"e32","question":"A project manager discovers mid-project that a key deliverable was never formally accepted by the customer in a previous project phase. What should the PM do?","optionA":"Move forward — the customer did not raise any issues so acceptance is implied.","optionB":"Retroactively get formal written acceptance from the customer before proceeding.","optionC":"Document the gap in the project log and accept it as a historical issue.","optionD":"Complete the project and address the acceptance gap at final closure.","correct":"B","explanation":"Formal acceptance (Validate Scope) is a required process. Implied acceptance is not sufficient. The PM must obtain formal written acceptance before proceeding — even retroactively. Option A assumes acceptance without documentation. Options C and D defer the issue rather than resolving it. PMI Principle: Mindset: Process Compliance & Formal Acceptance","domain":"Mindset: Process Compliance & Formal Acceptance","difficulty":"Medium"},{"id":"e33","question":"A project manager is told by a functional manager that a key resource will not be available for the project as promised. This threatens the project schedule. What should the PM do?","optionA":"Accept the situation and adjust the project plan without informing the sponsor.","optionB":"Attempt to resolve it directly with the functional manager first. If unresolved, escalate to the sponsor with a clear impact assessment.","optionC":"Complain to other team members about the functional manager's lack of cooperation.","optionD":"Immediately escalate to the sponsor without speaking to the functional manager.","correct":"B","explanation":"PMI escalation principle: try to resolve at your own level first, then escalate. The PM should negotiate with the functional manager directly. If that fails, escalate to the sponsor with clear data. Option A accepts the impact passively. Option C is unprofessional. Option D escalates without attempting direct resolution first. PMI Principle: Mindset: Communicate Before Escalate","domain":"Mindset: Communicate Before Escalate","difficulty":"Medium"},{"id":"e34","question":"A project team member requests extra days off for personal reasons during a critical project phase. Approving the request would impact the project schedule. What should the PM do?","optionA":"Deny the request — the project schedule takes absolute priority.","optionB":"Approve the request without assessing the schedule impact.","optionC":"Have an honest conversation with the team member about the impact, explore options (adjusted schedule, partial approval, task redistribution), and reach a fair resolution.","optionD":"Approve the request but hold the team member responsible for any resulting delays.","correct":"C","explanation":"PMI balances project needs with human respect. The PM must be honest about the impact while treating the team member with dignity. Exploring options before deciding is the PMI-aligned approach. Option A is dismissive of the human element. Option B ignores the project impact. Option D is unfair accountability transfer. PMI Principle: Mindset: Respect, Fairness & Servant Leadership","domain":"Mindset: Respect, Fairness & Servant Leadership","difficulty":"Medium"},{"id":"e35","question":"A project manager's organisation has a policy that all project communications with clients must be approved by the legal team before being sent. In a time-sensitive situation, the project manager sends a communication without legal approval to meet a deadline. What should the PM do next?","optionA":"Nothing — the communication was necessary and the outcome was positive.","optionB":"Immediately inform the legal team of what was sent and why, and seek guidance on whether a corrective action is needed.","optionC":"Hope the legal team does not find out and be more careful in the future.","optionD":"Retroactively send the communication through legal review to create a paper trail.","correct":"B","explanation":"PMI: transparency and responsibility. Once the policy was bypassed, the PM must disclose the situation to the appropriate team (legal) and accept the consequence. Option A treats the bypass as acceptable because it 'worked.' Option C is dishonest avoidance. Option D creates misleading documentation. PMI Principle: Ethics: Responsibility & Transparency","domain":"Ethics: Responsibility & Transparency","difficulty":"Medium"},{"id":"e36","question":"A project manager is aware that a subcontractor is charging for hours not worked on the project. The subcontractor is managed by a department head who is a personal friend of the sponsor. What should the PM do?","optionA":"Ignore it — the personal relationship makes addressing this politically risky.","optionB":"Confront the department head privately and threaten to report the issue.","optionC":"Document the discrepancy formally and report it through the organisation's proper channels regardless of the personal relationships involved.","optionD":"Raise it informally with the sponsor to handle as they see fit.","correct":"C","explanation":"Fraudulent billing must be reported regardless of political risk or personal relationships. PMI's Code of Ethics: Honesty and Responsibility. The PM documents and reports through proper channels. Option A ignores fraud due to political risk. Option B is unprofessional confrontation. Option D is an informal approach that may be influenced by the personal relationship. PMI Principle: Ethics: Honesty & Responsibility","domain":"Ethics: Honesty & Responsibility","difficulty":"Medium"},{"id":"e37","question":"During a project retrospective, team members identify that the project manager's poor communication caused a significant rework event. The PM disagrees with this assessment. What should the PM do?","optionA":"Defend their position firmly — the team's analysis is incorrect.","optionB":"Listen openly, consider the feedback seriously, acknowledge any valid points, and commit to improvement even if partially disagreeing.","optionC":"Dismiss the feedback — retrospectives are for the team, not the PM.","optionD":"Thank the team but take no action to avoid setting a precedent of accepting criticism.","correct":"B","explanation":"PMI: accountability and continuous improvement apply to the PM too. The PM should listen openly, acknowledge valid points, and commit to improvement. Defensive dismissal (Options A, C, D) contradicts the PM's accountability obligation and sets a poor example for the team. PMI Principle: Mindset: Accountability & Continuous Improvement","domain":"Mindset: Accountability & Continuous Improvement","difficulty":"Medium"},{"id":"e38","question":"A project sponsor asks the project manager to use a specific vendor without going through the normal procurement process, citing an 'urgent business need.' What should the PM do?","optionA":"Use the vendor as instructed — the sponsor has authority.","optionB":"Decline and follow the full procurement process regardless of urgency.","optionC":"Assess the urgency, follow the expedited procurement procedure if one exists, document the exception, and proceed with appropriate approvals.","optionD":"Use the vendor but document that it was a sponsor directive to protect the PM.","correct":"C","explanation":"Procurement processes exist to ensure fairness and proper governance. If an expedited process exists, use it with proper documentation. If not, the PM must follow the standard process. Option A bypasses governance entirely. Option B may not be practical if urgency is genuine. Option D accepts the bypass while only documenting responsibility — still a governance violation. PMI Principle: Mindset: Process Compliance & Fairness","domain":"Mindset: Process Compliance & Fairness","difficulty":"Medium"},{"id":"e39","question":"A project manager completes a project successfully, but during closure, discovers that a key lesson — a serious process failure — was never documented because the team was embarrassed about it. What should the PM do?","optionA":"Leave it undocumented — the project was successful and documentation serves no purpose now.","optionB":"Document the lesson learned honestly, regardless of how it reflects on the team.","optionC":"Document a softened version of the lesson to protect team reputation.","optionD":"Ask the team member responsible for the failure to document it themselves.","correct":"B","explanation":"Lessons learned must be honest and complete to benefit future projects. Omitting or softening a significant process failure deprives the organisation of critical knowledge. Option A wastes the learning opportunity. Option C documents a misleading version. Option D may result in a defensive or incomplete account. PMI Principle: Ethics: Honesty & Organisational Responsibility","domain":"Ethics: Honesty & Organisational Responsibility","difficulty":"Medium"},{"id":"e40","question":"A project manager receives a performance bonus tied to the project finishing on time. The project is at risk of missing the deadline. A team member suggests cutting corners on testing to meet the date. What should the PM do?","optionA":"Agree — the financial incentive benefits everyone indirectly.","optionB":"Reject the suggestion, maintain testing standards, and report the schedule risk to the sponsor transparently.","optionC":"Cut testing in lower-risk areas only to balance the risk.","optionD":"Agree but document that the decision was the team member's recommendation.","correct":"B","explanation":"Personal financial incentives do not override professional ethics or quality standards. PMI: the PM's responsibility is to the project's integrity and the organisation's long-term interests — not their personal bonus. Options A and C compromise quality for personal gain. Option D transfers responsibility while still agreeing to the violation. PMI Principle: Ethics: Responsibility & Avoiding Self-Interest","domain":"Ethics: Responsibility & Avoiding Self-Interest","difficulty":"Medium"},{"id":"e41","question":"A team member is consistently late submitting deliverables, impacting the project schedule. When the PM raises this, the team member responds that their functional manager is giving them conflicting priorities. What should the PM do?","optionA":"Escalate to the team member's functional manager immediately.","optionB":"Accept the situation — conflicting priorities are the team member's problem to solve.","optionC":"Meet with the team member to understand the conflict, then engage the functional manager jointly to align priorities.","optionD":"Remove the team member from the project and find a replacement.","correct":"C","explanation":"PMI: the PM acts as an integrator and advocate. The correct approach is to understand the conflict, then resolve it through a joint conversation with the functional manager — not unilateral escalation or acceptance. Option A bypasses understanding the full situation. Option B accepts a project risk passively. Option D is disproportionate. PMI Principle: Mindset: Proactive Problem-Solving & Servant Leadership","domain":"Mindset: Proactive Problem-Solving & Servant Leadership","difficulty":"Medium"},{"id":"e42","question":"A project manager is working on an international project and discovers that a decision made by the home office violates local laws in the host country. What should the PM do?","optionA":"Implement the decision — home office authority supersedes local considerations.","optionB":"Refuse to implement the decision and immediately report the legal conflict to management and legal counsel.","optionC":"Implement the decision but document the legal conflict for future reference.","optionD":"Ask the local team to implement it so the PM is not personally liable.","correct":"B","explanation":"PMI requires compliance with applicable laws. When a management decision violates local law, the PM must refuse to implement it and escalate to legal counsel and management immediately. Options A, C, and D all result in implementing an illegal action — the source or delegation does not change the legal exposure. PMI Principle: Ethics: Responsibility & Legal Compliance","domain":"Ethics: Responsibility & Legal Compliance","difficulty":"Medium"},{"id":"e43","question":"A project manager is approached by a journalist asking about the project's environmental impact. The project has had some environmental setbacks. What should the PM do?","optionA":"Provide a detailed honest account of the environmental situation.","optionB":"Decline to comment and refer the journalist to the organisation's communications team.","optionC":"Provide a positive spin on the project's environmental record.","optionD":"Tell the journalist the project has had no environmental issues.","correct":"B","explanation":"External communications — especially with media — must go through the organisation's designated channels. The PM should not speak to media about project matters without authorisation. Referring to the communications team is the correct action. Option A, even if honest, bypasses the communications process. Options C and D involve misrepresentation. PMI Principle: Ethics: Responsibility & Appropriate Communication Channels","domain":"Ethics: Responsibility & Appropriate Communication Channels","difficulty":"Medium"},{"id":"e44","question":"A project manager discovers that the project's cost estimates were deliberately understated in the proposal to win the contract, and the true cost is 40% higher. What should the PM do?","optionA":"Manage within the contracted budget as best as possible.","optionB":"Immediately disclose the discrepancy to management and the client and recommend a corrective approach.","optionC":"Gradually introduce costs over time to avoid a single large shock.","optionD":"Ask the finance team to absorb the excess cost in other budget lines.","correct":"B","explanation":"Deliberately understated estimates to win a contract is a serious ethics violation. The PM has a responsibility to disclose this — not manage it silently. Option A accepts the fraud passively. Option C is incremental concealment. Option D disguises the true cost through accounting manipulation. PMI Principle: Ethics: Honesty & Responsibility","domain":"Ethics: Honesty & Responsibility","difficulty":"Medium"},{"id":"e45","question":"A project manager is facing enormous schedule pressure. To save time, they decide to skip the formal stakeholder communication for a significant project decision and proceed directly. What is the likely consequence according to PMI?","optionA":"None — stakeholders will understand given the schedule pressure.","optionB":"Stakeholders who were not informed may become resistant or escalate objections after the fact, creating greater delays.","optionC":"The project will be completed faster, which will satisfy stakeholders.","optionD":"The PM will be recognised for decisive action under pressure.","correct":"B","explanation":"PMI: bypassing stakeholder communication may appear to save time but typically creates larger problems downstream — resistance, escalation, and loss of trust. This is the most predictable and documented consequence. Options A, C, and D are optimistic assumptions that do not reflect PMI's documented view of what happens when stakeholders are bypassed. PMI Principle: Mindset: Stakeholder Engagement Cannot Be Skipped","domain":"Mindset: Stakeholder Engagement Cannot Be Skipped","difficulty":"Medium"},{"id":"e46","question":"A project manager witnesses a colleague (another PM) misrepresenting their qualifications to clients. The colleague argues it is a 'minor exaggeration' that does not affect their ability to do the work. What should the PM do?","optionA":"Ignore it — it is not their project and not their responsibility.","optionB":"Advise the colleague privately that misrepresenting qualifications violates PMI's Code of Ethics and encourage them to correct it.","optionC":"Report the colleague to PMI immediately without speaking to them first.","optionD":"Tell the clients directly about the misrepresentation.","correct":"B","explanation":"PMI Code of Ethics: Honesty includes not misrepresenting qualifications. The first step is to address it directly with the colleague — giving them the opportunity to self-correct. Option A ignores an ethics obligation. Option C escalates without attempting direct resolution. Option D goes directly to clients — bypassing the colleague and the organisation. PMI Principle: Ethics: Honesty & Peer Accountability","domain":"Ethics: Honesty & Peer Accountability","difficulty":"Medium"},{"id":"e47","question":"A project manager is asked to prepare a project proposal and is aware that one of the potential solutions has a significant hidden risk that the client has not asked about. What should the PM do?","optionA":"Only disclose information the client specifically asks for — unsolicited disclosures may hurt the proposal.","optionB":"Proactively include the risk in the proposal with a mitigation strategy.","optionC":"Mention the risk verbally in the presentation but not in writing to avoid documentation.","optionD":"Disclose the risk only after the contract is signed.","correct":"B","explanation":"PMI: Honesty and Transparency require that known material risks be disclosed even when not explicitly asked. Hiding a significant risk to win a proposal is a deceptive practice. Option A treats disclosure as a liability. Option C creates verbal but no written record — insufficient and potentially deceptive. Option D deceives during the bidding process. PMI Principle: Ethics: Honesty & Complete Disclosure","domain":"Ethics: Honesty & Complete Disclosure","difficulty":"Medium"},{"id":"e48","question":"A project manager is completing a project for a client in a highly regulated industry. The PM discovers that a regulatory filing deadline was missed due to a planning oversight. The client is not yet aware. What should the PM do?","optionA":"Attempt to fix the filing quietly before the client discovers it.","optionB":"Immediately inform the client of the missed deadline, the impact, and the remediation plan.","optionC":"Wait to inform the client until the remediation plan is fully developed.","optionD":"Inform the client only if the regulatory body contacts them first.","correct":"B","explanation":"PMI: transparency means disclosing known issues to the client immediately — not after they discover it themselves, and not after a remediation plan is prepared. The client needs to know to manage their own regulatory obligations. Options A, C, and D all delay or withhold disclosure. PMI Principle: Ethics: Transparency & Client Responsibility","domain":"Ethics: Transparency & Client Responsibility","difficulty":"Medium"},{"id":"e49","question":"A project manager is about to close a successful project. A team member suggests padding the final project report with minor accomplishments to make the team look better to management. What should the PM do?","optionA":"Allow it — minor embellishments in a success report are harmless.","optionB":"Reject the suggestion and ensure the final report accurately reflects the project's actual performance.","optionC":"Allow it only for the executive summary, keeping the detailed report accurate.","optionD":"Let the team member write the section themselves so the PM is not involved.","correct":"B","explanation":"PMI: Honesty in all project documentation — including closure reports. Padding a report misrepresents performance and sets false expectations for future similar projects. Options A and C involve misrepresentation at different levels. Option D makes the team member complicit while the PM looks the other way — still a PMI ethics violation. PMI Principle: Ethics: Honesty & Accurate Reporting","domain":"Ethics: Honesty & Accurate Reporting","difficulty":"Medium"}]};
